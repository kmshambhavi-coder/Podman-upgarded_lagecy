Submit URL:
  ai_description: >-
    ### General Description

    Submits URLs to the CrowdStrike Falcon Sandbox for automated threat analysis and
    detonation. This action allows security analysts to safely examine suspicious
    URLs in various virtualized environments to determine their threat level, behavior,
    and associated indicators of compromise (IOCs). It is an asynchronous action that
    polls for the completion of the analysis before returning the final report.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | URLs | String | Yes | A comma-separated list of URLs to be submitted for sandbox
    analysis. |

    | Sandbox Environment | Dropdown | No | Specifies the operating system environment
    for the analysis (e.g., Windows 10 64-bit, Linux Ubuntu). Default is 'Windows
    10, 64-bit'. |

    | Network Environment | Dropdown | No | Specifies the network configuration for
    the sandbox (Default, TOR, Offline, Simulated). Default is 'Default'. |

    | Check Duplicate | Boolean | No | If enabled, the action checks if the URL has
    been previously analyzed and retrieves the existing report instead of performing
    a new submission. |


    ### Flow Description

    1. **Initialization**: The action extracts the target URLs and configuration parameters,
    then initializes the CrowdStrike manager.

    2. **Duplicate Verification**: If the 'Check Duplicate' parameter is enabled,
    the action searches for existing submissions in CrowdStrike matching the URL's
    domain. If a previous report is found, it is queued for retrieval.

    3. **Submission**: For new URLs (or if duplicate checking is disabled), the action
    sends a POST request to CrowdStrike to initiate a sandbox analysis task with the
    specified environment and network settings.

    4. **Asynchronous Polling**: The action enters an 'In Progress' state, periodically
    polling the CrowdStrike API to check the status of the analysis tasks.

    5. **Report Retrieval**: Once the analysis is complete, the action fetches the
    detailed summary reports, including verdicts, threat scores, and classification
    tags.

    6. **Output Generation**: The action compiles the results into a JSON object and
    a summary data table for the user.


    ### Additional Notes

    - This action requires a CrowdStrike Falcon Sandbox license.

    - The 'Check Duplicate' feature performs filtering based on the network location
    (domain) of the URL.
