    ### General Description

    This action allows users to add a comment to a specific Identity Protection detection
    within the CrowdStrike Falcon platform. It is primarily used for documenting investigation
    steps, providing context, or updating the status of a detection from within Google
    SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Detection ID | String | Yes | The unique identifier of the Identity Protection
    detection in CrowdStrike that needs to be updated. |

    | Comment | String | Yes | The text content of the comment to be appended to the
    detection. |


    ### Additional Notes

    - The action first verifies the existence of the detection ID before attempting
    to add the comment.

    - This action interacts with the CrowdStrike Alerts API (v2).


    ### Flow Description

    1. **Initialization**: The action initializes the CrowdStrike manager using the
    provided API credentials (Client ID, Secret, and API Root).

    2. **Verification**: It performs a lookup for the provided `Detection ID` to ensure
    it exists in the CrowdStrike environment.

    3. **Mutation**: If the detection is found, the action sends a PATCH request to
    the CrowdStrike API to append the specified `Comment` to the detection's metadata.

    4. **Completion**: The action returns a success message upon successful update
    or an error message if the detection is not found or the API call fails.
