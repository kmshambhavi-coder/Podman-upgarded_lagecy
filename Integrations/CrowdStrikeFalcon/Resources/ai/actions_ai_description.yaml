Download File:
  ai_description: >-
    ### General Description

    Downloads specific files from endpoints managed by CrowdStrike Falcon. This action
    leverages CrowdStrike's Real-Time Response (RTR) capabilities to initiate a session
    with a host and retrieve files based on their filename. It is an asynchronous
    action that monitors the download progress and saves the resulting files to a
    specified local directory on the Google SecOps runner. The downloaded files are
    packaged in password-protected .7z archives (password: "infected").


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Customer ID | String | No | The specific Customer ID (CID) to use for the request.
    If not provided, the default CID from the integration configuration is used. |

    | Download Folder Path | String | Yes | The local directory path on the SOAR runner
    where the downloaded files will be stored. Must start with a forward slash (e.g.,
    /tmp/downloads). |

    | Overwrite | Boolean | Yes | If enabled, the action will overwrite any existing
    files in the destination folder that have the same name. |


    ### Additional Notes

    * This action requires at least one **File Name** entity and at least one **IP
    Address** or **Hostname** entity to be present in the alert scope to function.

    * The action will fail if the specified `Download Folder Path` does not exist
    or is not accessible.


    ### Flow Description

    1. **Validation**: The action identifies suitable host entities (IP or Hostname)
    and filename entities from the alert scope. It also validates the local folder
    path and checks for existing files if `Overwrite` is disabled.

    2. **Session Initiation**: For each host, the action searches for the corresponding
    CrowdStrike Device ID and starts a Real-Time Response (RTR) batch session.

    3. **Command Execution**: A batch `get` command is issued for each filename entity
    against the established host sessions.

    4. **Asynchronous Monitoring**: The action enters an 'In Progress' state, periodically
    polling CrowdStrike to check the status of the batch commands.

    5. **File Retrieval**: Once the commands are completed, the action fetches the
    file content from CrowdStrike.

    6. **Local Storage**: The retrieved content is saved to the specified local directory.
    The filename is formatted as `{EntityIdentifier}_{OriginalFileName}.7z`.

    7. **Entity Enrichment**: The `FILENAME` entities are updated in Google SecOps
    with the local file path added to their additional properties, and their 'is_enriched'
    status is set to true.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the 'is_enriched' attribute and adds the local file path to the 'additional_properties'
      of FILENAME entities. It also writes files to the local filesystem of the SOAR
      runner.
  categories:
    enrichment: false
  entity_usage:
    entity_types:
    - ADDRESS
    - HOSTNAME
    - FILENAME
