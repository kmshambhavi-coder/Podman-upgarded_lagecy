Delete IOC:
  ai_description: >-
    Deletes custom Indicators of Compromise (IOCs) from the CrowdStrike Falcon platform.
    This action is used to remove previously uploaded threat intelligence markers
    such as IP addresses, hostnames, domains (extracted from URLs), and file hashes
    (MD5 or SHA-256) from the environment's watch list.


    ### Parameters Description


    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not have any action-specific parameters.
    It relies on the integration's global configuration (API Root, Client ID, Client
    Secret, etc.). |


    ### Flow Description


    1.  **Initialization**: The action initializes the CrowdStrike manager using the
    provided integration configuration (API credentials and root URL).

    2.  **Entity Filtering**: It identifies suitable entities from the case, specifically
    targeting Hostnames, URLs, IP Addresses, and File Hashes.

    3.  **IOC Identification**: For each valid entity, the action queries the CrowdStrike
    API to retrieve the internal unique identifier (IOC ID) associated with that specific
    indicator value.

    4.  **Deletion**: If a matching IOC ID is found, the action sends a delete request
    to CrowdStrike to remove the indicator from the platform.

    5.  **Result Reporting**: The action tracks which entities were successfully deleted
    and which were not found or failed, providing a summary message at the end of
    the execution.
