Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and the CrowdStrike Falcon instance. It ensures that the provided
    API credentials (Client ID and Secret) are valid and that the environment can
    successfully communicate with the CrowdStrike API endpoint.


    ### Parameters Description

    This action does not have any action-specific parameters. It relies entirely on
    the integration's global configuration parameters:

    * **API Root**: The base URL for the CrowdStrike API.

    * **Client API ID**: The unique identifier for the API client.

    * **Client API Secret**: The secret key associated with the Client ID.

    * **Verify SSL**: A boolean flag indicating whether to validate the SSL certificate
    of the API endpoint.

    * **Customer ID**: (Optional) The specific CID for the CrowdStrike environment.


    ### Additional Notes

    * This action is typically used during the initial setup of the integration or
    for troubleshooting communication issues.

    * As per standard SOAR conventions, Ping actions are excluded from being categorized
    as enrichment actions.


    ### Flow Description

    1. **Configuration Extraction**: The script retrieves the global integration settings,
    including the API Root, credentials, and SSL preferences.

    2. **Manager Initialization**: It initializes the `CrowdStrikeManager` using the
    extracted configuration.

    3. **Connectivity Test**: The manager executes a `test_connectivity` method, which
    performs a low-impact API call (searching for a single device ID) to validate
    the connection.

    4. **Result Reporting**: If the API call is successful, the action returns a success
    status with a 'Connected successfully' message. If an exception occurs (e.g.,
    authentication failure or network timeout), it captures the error and reports
    a failure.
