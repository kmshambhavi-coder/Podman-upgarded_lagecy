Get Event Offset:
  ai_description: >-
    ### General Description

    This action retrieves the event offset from CrowdStrike Falcon, which is primarily
    used to synchronize or troubleshoot the Event Streaming Connector. It identifies
    the latest event position within the CrowdStrike stream to help determine where
    event processing should resume or start.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Max Events To Process | Integer | Yes | Specifies the maximum number of events
    the action will scan (starting from approximately 30 days ago) to find the most
    recent offset. Default is 10,000. |


    ### Flow Description

    1. **Authentication**: Connects to the CrowdStrike Falcon API using the provided
    Client ID and Secret.

    2. **Stream Discovery**: Discovers an available data stream feed from the CrowdStrike
    sensors.

    3. **Event Processing**: Retrieves and iterates through events from the stream
    up to the limit defined in the 'Max Events To Process' parameter.

    4. **Offset Identification**: Sorts the retrieved detections by their offset value
    to identify the most recent event.

    5. **Output**: Returns the highest offset found and its corresponding ISO-formatted
    timestamp as a JSON result.


    ### Additional Notes

    This action does not process specific entities or alerts; it is a utility action
    for managing the state of the Event Streaming Connector. It starts scanning for
    events from a 30-day lookback window.
