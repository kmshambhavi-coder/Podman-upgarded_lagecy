Lift Contained Endpoint:
  ai_description: >-
    ### General Description

    Lifts network containment (quarantine) for Hostname and IP Address entities in
    CrowdStrike Falcon. This action is designed to restore network connectivity to
    endpoints that were previously isolated. It is an asynchronous action that initiates
    the lift request and then periodically polls the device status until the endpoint
    returns to a 'normal' state or the action reaches its execution timeout.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Customer ID | String | No | The unique identifier of the customer (CID) for
    which to execute the action. If provided, this value overrides the Customer ID
    defined in the integration configuration. |

    | Fail If Timeout | Boolean | No | If enabled (True), the action will report a
    failure status if the containment lift process does not complete for all targeted
    endpoints within the allotted timeout period. Default is True. |


    ### Additional Notes

    - This action is **asynchronous**. It may remain in an 'In Progress' state for
    several minutes while waiting for the CrowdStrike agent on the endpoint to receive
    and process the lift command.

    - The action supports multi-tenancy via the 'Customer ID' parameter.

    - If an endpoint is already in a 'Normal' state, the action will skip the lift
    command and report the entity as skipped.


    ### Flow Description

    1. **Initialization**: Retrieves connection settings and action parameters, including
    the optional Customer ID and timeout behavior.

    2. **Entity Filtering**: Identifies target entities from the case context, specifically
    filtering for Hostname and IP Address types.

    3. **Device Discovery**: For each entity, the action queries the CrowdStrike Falcon
    API to find the corresponding internal Device ID.

    4. **Command Execution**: If the device is currently contained, the action sends
    a `lift_containment` request to the CrowdStrike API.

    5. **Status Polling (Async)**: The action enters an asynchronous loop, periodically
    checking the status of the device in CrowdStrike. It waits for the status to transition
    to 'normal'.

    6. **Finalization**: Once the device reaches a 'normal' state, the action completes
    for that entity. If the timeout is reached and 'Fail If Timeout' is enabled, the
    action reports a failure.

    7. **Result Output**: Detailed device information for each processed endpoint
    is attached to the action results in JSON format.
