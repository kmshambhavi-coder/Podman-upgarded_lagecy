    Adds a comment to a specific incident in CrowdStrike Falcon. This action is primarily
    used to document investigation notes, status updates, or automated findings directly
    within the CrowdStrike console for a given incident ID. Note: This action is marked
    as deprecated in the integration metadata.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Incident ID | String | Yes | The unique identifier of the incident in CrowdStrike
    that needs to be updated. |

    | Comment | String | Yes | The text content of the comment to be appended to the
    incident record. |


    ### Flow Description

    1. **Authentication**: The action initializes a connection to the CrowdStrike
    Falcon API using the provided Client ID, Client Secret, and API Root.

    2. **Incident Validation**: It first verifies the existence of the specified Incident
    ID by querying the CrowdStrike incident details endpoint.

    3. **Comment Submission**: If the incident is found, the action sends a request
    to the CrowdStrike incident actions endpoint (`/incidents/entities/incident-actions/v1`)
    with the `add_comment` parameter.

    4. **Result Reporting**: The action completes with a success message if the comment
    is successfully posted, or fails if the incident is not found or an API error
    occurs.
