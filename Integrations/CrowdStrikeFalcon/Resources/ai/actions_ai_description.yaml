Run Script:
  ai_description: >-
    Executes a PowerShell script on remote endpoints managed by CrowdStrike Falcon
    using Real-Time Response (RTR). This action allows security analysts to perform
    remediation, forensics, or system configuration tasks directly from Google SecOps.
    It supports both pre-defined scripts stored in CrowdStrike and raw PowerShell
    payloads. The action operates asynchronously, polling for the script's execution
    status and returning the standard output (stdout) and error (stderr) results.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Customer ID | String | No | The CrowdStrike Customer ID (CID). If not provided,
    the integration's default CID is used. |

    | Script Name | String | No | The name of a script file already hosted in the
    CrowdStrike environment. |

    | Raw Script | String | No | A raw PowerShell script payload to execute. Takes
    priority over 'Script Name'. |

    | Hostname | String | No | A comma-separated list of additional hostnames to target
    alongside the entities. |


    ### Additional Notes

    - Either **Script Name** or **Raw Script** must be provided for the action to
    run. If both are provided, **Raw Script** takes precedence.

    - The action is asynchronous; it initiates the script and then polls CrowdStrike
    for completion. Ensure the action timeout in the IDE is sufficient for the script's
    expected duration.


    ### Flow Description

    1. **Target Identification**: Collects hostnames and IP addresses from the provided
    SecOps entities and the 'Hostname' parameter.

    2. **Device Discovery**: Searches CrowdStrike for unique Device IDs associated
    with the identified hostnames or IP addresses.

    3. **Accessibility Check**: Verifies that the target devices are currently online
    and in a 'normal' status to ensure they can receive RTR commands.

    4. **Session Initialization**: Creates a Real-Time Response (RTR) session for
    each accessible device.

    5. **Script Execution**: Dispatches the PowerShell command (either the raw payload
    or the named script) to the devices via the RTR session.

    6. **Status Polling**: Periodically checks the status of the command execution
    using the Cloud Request ID.

    7. **Result Retrieval**: Captures the execution output (stdout/stderr) once complete
    and populates the action's JSON results.
