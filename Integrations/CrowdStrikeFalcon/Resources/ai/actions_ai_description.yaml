Add Alert Comment:
  ai_description: >-
    Adds a comment to a specific alert in CrowdStrike Falcon. This action allows security
    analysts to append notes or context to an existing alert within the CrowdStrike
    platform directly from Google SecOps. It first validates the existence of the
    alert in CrowdStrike and ensures the comment meets the platform's character length
    requirements before performing the update.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Alert ID | String | Yes | The unique identifier of the alert in CrowdStrike
    Falcon that needs to be updated. |

    | Comment | String | Yes | The text content of the comment to be added to the
    alert. Maximum length is 1024 characters. |


    ### Additional Notes

    - The action will fail if the provided Alert ID does not exist in the CrowdStrike
    environment.

    - The comment length is strictly enforced to a maximum of 1024 characters as per
    CrowdStrike API limitations.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the API configuration (API Root, Client
    ID, Secret) and action parameters (Alert ID, Comment).

    2. **Validation:** Checks if the comment length is within the 1024-character limit.

    3. **Alert Verification:** Calls the CrowdStrike API to verify that the specified
    Alert ID exists.

    4. **Comment Submission:** Sends a PATCH request to the CrowdStrike `/alerts/entities/alerts/v3`
    endpoint to append the comment to the alert.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
