Add Comment to Detection:
  ai_description: >-
    ### General Description

    Adds a comment to a specific detection in CrowdStrike Falcon. This action is used
    to provide additional context or updates to an existing security detection within
    the CrowdStrike platform. It first retrieves the current status of the detection
    to ensure the comment is applied correctly without unintentionally changing the
    detection's state.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Detection ID | String | Yes | The unique identifier of the detection in CrowdStrike
    Falcon to which the comment will be added. |

    | Comment | String | Yes | The text content of the comment to be appended to the
    detection. |


    ### Flow Description

    1. **Parameter Initialization**: The action extracts the necessary configuration
    (API Root, Credentials) and action parameters (Detection ID, Comment).

    2. **Status Retrieval**: It calls the CrowdStrike API to fetch the current status
    of the specified Detection ID. This is a prerequisite for the update call.

    3. **Comment Submission**: It sends a PATCH request to the CrowdStrike `detections`
    endpoint, providing the Detection ID, the comment text, and the previously retrieved
    status to append the comment.

    4. **Completion**: The action reports success if the comment is successfully added
    or failure if an error occurs during the API interaction.


    ### Additional Notes

    - **Deprecation**: This action is marked as deprecated in the integration metadata.

    - **External Mutation**: This action modifies data in the CrowdStrike Falcon platform
    by adding a comment to a detection record.
