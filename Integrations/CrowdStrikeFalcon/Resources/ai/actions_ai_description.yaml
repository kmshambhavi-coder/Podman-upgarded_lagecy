Upload IOCs:
  ai_description: "Uploads Indicators of Compromise (IOCs) to the CrowdStrike Falcon\
    \ platform to enable detection or prevention across managed endpoints. This action\
    \ supports Hostname, URL, IP Address, and File Hash entities. For URL entities,\
    \ the action automatically extracts the domain component. For File Hash entities,\
    \ it supports MD5 and SHA-256 formats. \n\n### Flow Description\n1. **Parameter\
    \ Validation**: Validates the provided 'Platform' values and ensures 'Days To\
    \ Expire' is a positive integer.\n2. **Host Group Resolution**: If a 'Host Group\
    \ Name' is provided, the action retrieves the corresponding internal ID from CrowdStrike.\n\
    3. **Entity Filtering**: Identifies supported entities (IP, Hostname, URL, Hash)\
    \ from the current context.\n4. **IOC Preparation**: For each entity, it determines\
    \ the specific IOC type (e.g., ipv4, domain, md5). It also validates the 'Action'\
    \ parameter; while 'Detect' is universal, the 'Block' action is strictly enforced\
    \ only for File Hash entities.\n5. **API Interaction**: Submits the IOC data to\
    \ CrowdStrike's indicators API, applying the specified severity, platforms, and\
    \ expiration date.\n\n### Parameters Description\n| Parameter | Type | Mandatory\
    \ | Description |\n| :--- | :--- | :--- | :--- |\n| **Platform** | String | Yes\
    \ | A comma-separated list of platforms (Windows, Linux, Mac) the IOC applies\
    \ to. |\n| **Severity** | Enum | Yes | The severity level assigned to the IOC\
    \ (Informational, Low, Medium, High, Critical). |\n| **Comment** | String | No\
    \ | Additional context or notes to be attached to the IOC in CrowdStrike. |\n\
    | **Host Group Name** | String | No | The name of a specific host group to which\
    \ the IOC should be applied. If omitted, the IOC is applied globally. |\n| **Action**\
    \ | Enum | No | The policy to apply: 'Detect' or 'Block'. Note: 'Block' is only\
    \ valid for File Hashes; other types default to 'Detect'. |\n| **Days To Expire**\
    \ | Integer | No | The number of days until the IOC automatically expires. |\n\
    \n### Additional Notes\n- Hostname entities are treated as domain IOCs.\n- If\
    \ the 'Action' is set to 'Block' for a non-hash entity (like an IP or Domain),\
    \ the action will automatically downgrade the policy to 'Detect' for that specific\
    \ entity to ensure successful upload."
