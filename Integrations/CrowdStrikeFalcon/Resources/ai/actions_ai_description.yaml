Hide Hosts:
  ai_description: >-
    ### General Description

    Use the **Hide Hosts** action to hide one or more hosts from the CrowdStrike Falcon
    console. This action is useful for cleaning up the console view by removing decommissioned
    or irrelevant hosts. It supports processing both Hostname and IP Address entities
    attached to a case, as well as manually provided hostnames.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Hostname | String | No | A comma-separated list of hostnames to hide in CrowdStrike
    Falcon. The action processes these values in addition to any Hostname and IP Address
    entities attached to the case. |

    | Customer ID | String | No | The unique CrowdStrike Customer ID (CID) used to
    target a specific tenant. This is required in Falcon Flight Control or multi-tenant
    environments to perform the action on a specific child CID. If left empty, the
    CID from the integration configuration is used. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the API credentials from the
    integration configuration and extracts the optional `Hostname` list and `Customer
    ID` from the action parameters.

    2. **Entity Filtering:** It identifies all `ADDRESS` (IP) and `HOSTNAME` entities
    attached to the current Google SecOps case.

    3. **Device Discovery:** For each identified entity and each manually provided
    hostname, the action queries the CrowdStrike API to find the corresponding unique
    `device_id`. It uses the provided `Customer ID` to scope the search.

    4. **Bulk Execution:** Once the `device_id` values are collected, the action sends
    a single bulk request to the CrowdStrike `devices-actions` endpoint with the `hide_host`
    command.

    5. **Result Finalization:** The action updates the execution status based on whether
    any hosts were successfully hidden and provides a detailed JSON result containing
    the metadata of the processed devices.


    ### Additional Notes

    - This action performs a state change in CrowdStrike Falcon by hiding the hosts
    from the management console.

    - If no valid entities are found and no hostnames are provided in the parameters,
    the action will return a failure message.

    - The action handles both active and hidden hosts during the discovery phase to
    ensure the correct `device_id` is targeted.
