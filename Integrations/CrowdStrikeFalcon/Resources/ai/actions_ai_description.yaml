Get Alert Details:
  ai_description: >-
    ### General Description

    The **Get Alert Details** action retrieves comprehensive metadata and status information
    for a specific alert within the CrowdStrike Falcon platform. It is primarily used
    to gather deep context about a detection, including device information, behavior
    details, and MITRE ATT&CK mappings, which can then be used for automated decision-making
    or reporting within a playbook.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Alert ID** | String | Yes | The unique identifier (Composite ID) of the alert
    in CrowdStrike Falcon for which you want to retrieve details. |


    ### Additional Notes

    - This action does not require entities to be present in the Google SecOps case;
    it operates solely based on the provided **Alert ID** parameter.

    - If the specified Alert ID is not found, the action will fail with an informative
    error message.


    ### Flow Description

    1. **Authentication**: The action establishes a secure connection to the CrowdStrike
    Falcon API using the configured Client ID and Secret.

    2. **Data Retrieval**: It sends a request to the CrowdStrike Alerts API (`/alerts/entities/alerts/v2`)
    specifically for the provided Alert ID.

    3. **Validation**: The action checks if the API returned valid data for the requested
    ID.

    4. **Output**: Upon success, the full raw JSON data of the alert is returned as
    the action's result, and a success message is logged.
