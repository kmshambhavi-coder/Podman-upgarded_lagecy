Close Detection:
  ai_description: >-
    ### General Description

    Closes a specific detection in CrowdStrike Falcon by updating its status to 'closed'.
    This action allows users to programmatically resolve detections and optionally
    hide them from the CrowdStrike Falcon management console UI. Note that this action
    is considered deprecated, and the 'Update Detection' action is recommended as
    the best practice for managing detection states.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Detection ID | String | Yes | The unique identifier of the CrowdStrike Falcon
    detection that needs to be closed. |

    | Hide Detection | Boolean | No | If enabled (True), the action will hide the
    detection in the CrowdStrike Falcon UI. Defaults to True. |


    ### Additional Notes

    - This action performs a state change in the external CrowdStrike Falcon system.

    - It does not process or iterate over Google SecOps entities; it operates solely
    based on the provided 'Detection ID' parameter.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the API configuration (Root,
    Client ID, Secret, etc.) and the action-specific parameters: `Detection ID` and
    `Hide Detection`.

    2. **Manager Initialization**: Initializes the `CrowdStrikeManager` to handle
    authentication and API communication.

    3. **API Interaction**: Calls the CrowdStrike `detections` endpoint using a `PATCH`
    request. It sends the `Detection ID`, sets the status to `closed`, and sets the
    `show_in_ui` flag based on the inverse of the `Hide Detection` parameter.

    4. **Result Handling**: If the API call is successful, it returns a success message.
    If an error occurs (e.g., invalid ID or connectivity issues), it logs the error
    and marks the action as failed.
  capabilities:
