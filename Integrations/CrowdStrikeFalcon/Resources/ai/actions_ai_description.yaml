Search Events:
  ai_description: >-
    Searches for events within CrowdStrike Falcon repositories using custom queries.
    This action is designed to retrieve historical event data for investigation and
    threat hunting purposes. It operates asynchronously, first initiating a search
    job in a specified repository and then polling for the results until completion
    or timeout.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Repository** | DDL | Yes | The CrowdStrike repository to search. Options include
    'All', 'Falcon', 'Third Party', 'IT Automation', and 'Forensics'. |

    | **Query** | String | Yes | The search query to execute. The action automatically
    appends a `head` command to limit results based on the 'Max Results To Return'
    parameter. |

    | **Time Frame** | DDL | No | The time range for the search. If set to 'Custom',
    the 'Start Time' parameter must be provided. |

    | **Start Time** | String | No | The start time for the search in ISO 8601 format.
    Mandatory if 'Time Frame' is set to 'Custom'. |

    | **End Time** | String | No | The end time for the search in ISO 8601 format.
    If omitted and 'Time Frame' is 'Custom', the current time is used. |

    | **Max Results To Return** | Integer | No | The maximum number of events to retrieve
    (Default: 50, Maximum: 1000). |


    ### Additional Notes

    - This action does not run on specific entities; it performs a global search based
    on the provided query.

    - As an asynchronous action, it may require multiple execution cycles to complete.
    Ensure the script timeout in the Google SecOps IDE is configured appropriately
    for long-running queries.


    ### Flow Description

    1. **Initialization**: The action extracts and validates input parameters, ensuring
    that custom time frames have the required start times.

    2. **Job Creation**: It sends a request to CrowdStrike to initiate a search job
    in the selected repository with the formatted query and time range.

    3. **Polling**: The action enters an asynchronous state, storing the `job_id`.
    In subsequent cycles, it checks the status of the job.

    4. **Data Retrieval**: Once the job status is 'Completed', the action fetches
    the resulting events.

    5. **Finalization**: The retrieved events are attached to the action's JSON results,
    and the action completes successfully.
