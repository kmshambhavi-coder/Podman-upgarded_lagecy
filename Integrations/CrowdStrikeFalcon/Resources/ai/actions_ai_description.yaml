    \ expiration period, and detection policy for specific entities identified within\
    \ a case.\n\n### Parameters Description\n\n| Parameter | Type | Mandatory | Description\
    \ |\n| :--- | :--- | :--- | :--- |\n| Description | String | No | Specifies a\
    \ new description for the custom IOCs. |\n| Source | String | No | Specifies the\
    \ source for the custom IOCs (e.g., a specific threat intel feed). |\n| Expiration\
    \ days | Integer | No | The number of days from the current time until the IOC\
    \ should expire. |\n| Detect policy | Boolean | No | If enabled (True), the IOC\
    \ will be set to a 'detect' policy, triggering notifications when identified.\
    \ If disabled (False), no action will be taken. Default is True. |\n\n### Additional\
    \ Notes\n- **Entity Handling**: Hostname entities are treated as domain IOCs.\
    \ For URL entities, the action automatically extracts the domain component. \n\
    - **Hash Support**: Only MD5 and SHA-256 hash types are supported.\n- **Logic**:\
    \ The action first retrieves the internal CrowdStrike ID for the IOC before applying\
    \ updates. It also fetches existing IOC details to preserve the current severity\
    \ level during the update process.\n\n### Flow Description\n1. **Initialization**:\
    \ Extracts integration configuration (API credentials) and action parameters (Description,\
    \ Source, Expiration, Policy).\n2. **Entity Filtering**: Identifies supported\
    \ entities (Hostname, URL, IP Address, and FileHash) from the target list.\n3.\
    \ **IOC Identification**: For each valid entity, it queries the CrowdStrike API\
    \ to find the corresponding internal IOC ID.\n4. **Detail Retrieval**: Fetches\
    \ the current details of the identified IOC to ensure existing attributes like\
    \ 'severity' are maintained.\n5. **Update Execution**: Performs a PATCH request\
    \ to CrowdStrike to update the IOC's description, source, expiration date (calculated\
    \ from 'Expiration days'), and detection policy.\n6. **Result Reporting**: Captures\
    \ the updated IOC resource data and provides a summary of successful and failed\
    \ updates in the action output."
