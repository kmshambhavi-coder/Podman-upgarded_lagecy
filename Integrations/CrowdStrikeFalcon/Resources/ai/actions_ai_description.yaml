Contain Endpoint:
  ai_description: >-
    ### General Description

    Contains (quarantines) endpoint entities in CrowdStrike Falcon. This action is
    used to isolate potentially compromised hosts from the network to prevent the
    spread of threats. It supports both Hostname and IP Address entities and operates
    asynchronously to monitor the containment status until completion.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Customer ID | String | No | The specific Customer ID (CID) to use for this action.
    If provided, it overrides the CID configured in the integration settings. This
    is useful for multi-tenant environments. |

    | Fail If Timeout | Boolean | No | If enabled (True), the action will report a
    failure status if the containment process does not complete within the action's
    execution timeout. Default is True. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves API credentials and configuration,
    including the optional Customer ID and the 'Fail If Timeout' preference.

    2. **Entity Filtering**: It identifies all Hostname and IP Address entities provided
    in the current context that match CrowdStrike's supported types.

    3. **Device Discovery**: For each entity, the action queries the CrowdStrike Falcon
    API to find the corresponding device ID using the entity's identifier.

    4. **Status Verification**: It checks the current containment status of the device.
    If the device is already contained, it is marked as skipped to avoid redundant
    operations.

    5. **Containment Initiation**: If the device is not contained, the action sends
    a request to CrowdStrike to initiate the 'contain' (quarantine) action.

    6. **Asynchronous Monitoring**: The action enters an asynchronous state, periodically
    polling the CrowdStrike API to check if the device status has transitioned to
    'contained'.

    7. **Completion**: Once the devices are confirmed as 'contained', or if the timeout
    is reached, the action completes, providing a summary of the results and detailed
    JSON data for each processed device.


    ### Additional Notes

    This is an asynchronous action. It will continue to run in the background, polling
    the external system until the containment is confirmed or the execution deadline
    is reached.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Initiates a containment (quarantine) action on the target endpoint in CrowdStrike
      Falcon, which isolates the host from the network to prevent further threat propagation.
    fetches_data: true
    internal_data_mutation_explanation: null
