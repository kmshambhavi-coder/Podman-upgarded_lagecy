Submit File:
  ai_description: >-
    Submits files to the CrowdStrike Falcon Sandbox for automated malware analysis
    and retrieves the resulting threat intelligence. This action supports both direct
    file uploads and archives, allowing users to specify the sandbox environment (OS)
    and network routing (e.g., TOR, Offline). It can optionally check for duplicate
    submissions to reuse existing reports and supports password-protected documents
    or archives. As an asynchronous action, it handles the end-to-end process of uploading,
    initiating analysis, polling for completion, and retrieving the final verdict
    and report details.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | File Paths | String | Yes | Comma-separated list of local file paths to be submitted
    for analysis. |

    | Sandbox Environment | String | No | The target OS environment for the analysis
    (e.g., 'Windows 10, 64-bit', 'Linux Ubuntu 16.04, 64-bit'). |

    | Network Environment | String | No | The network configuration for the sandbox
    (Default, TOR, Offline, Simulated). |

    | Archive Password | Password | No | The password required to extract files from
    submitted .zip or .7z archives. |

    | Document Password | Password | No | The password required to open submitted
    Adobe or Office documents (max 32 characters). |

    | Check Duplicate | Boolean | No | If enabled (default), the action checks if
    the file was previously submitted and returns the existing report instead of re-analyzing.
    |

    | Comment | String | No | A descriptive comment to associate with the submission
    in the CrowdStrike console. |

    | Confidential Submission | Boolean | No | If enabled, the submitted file is only
    visible to users within your specific customer account. |


    ### Additional Notes

    - This action requires a valid CrowdStrike Falcon Sandbox license.

    - The action is asynchronous; it will enter an 'In Progress' state while waiting
    for the sandbox analysis to complete.

    - Supported archive formats include .zip and .7z.


    ### Flow Description

    1. **Upload Stage:** The action uploads the specified files or archives to the
    CrowdStrike Falcon Sandbox using the provided credentials and passwords.

    2. **Deduplication Check:** If 'Check Duplicate' is true, the action queries CrowdStrike
    for existing analysis reports matching the file's SHA256 hash.

    3. **Submission Stage:** For new files (or if deduplication is disabled), the
    action initiates a sandbox analysis job with the configured environment and network
    settings.

    4. **Status Polling:** The action periodically checks the status of the analysis
    jobs until they reach a terminal state (success or error).

    5. **Report Retrieval:** Once analysis is finished, the action retrieves the summary
    report, including the verdict (e.g., malicious, whitelisted) and threat score.

    6. **Result Generation:** The action populates the JSON results and creates data
    tables containing the analysis summary for each submitted file.
