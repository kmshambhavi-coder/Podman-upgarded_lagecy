Update Detection:
  ai_description: >-
    ### General Description

    Updates the status and/or the assigned user of a specific detection in CrowdStrike
    Falcon. This action is primarily used for incident management and workflow orchestration,
    allowing analysts to programmatically transition detection states or reassign
    ownership within the CrowdStrike platform.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Detection ID** | String | Yes | The unique identifier of the detection in
    CrowdStrike Falcon that needs to be updated. |

    | **Status** | Dropdown | Yes | The new status to assign to the detection (e.g.,
    `new`, `in_progress`, `true_positive`, `false_positive`, `ignored`, `closed`).
    If set to `Select One`, the **Assign Detection to** parameter must be provided.
    |

    | **Assign Detection to** | String | No | The email address of the CrowdStrike
    Falcon user to whom the detection should be assigned. |


    ### Additional Notes

    * **Validation Logic:** The action requires either a valid **Status** (anything
    other than `Select One`) or a value in **Assign Detection to**. If **Status**
    is `Select One` and no assignee is provided, the action will fail.

    * **User Resolution:** If an email is provided in **Assign Detection to**, the
    action performs an internal lookup to resolve that email to a CrowdStrike User
    UUID before performing the update.

    * **Deprecation:** Note that the metadata indicates this action is considered
    deprecated.


    ### Flow Description

    1. **Initialization:** Retrieves integration configuration (API Root, Credentials,
    SSL settings) and action parameters.

    2. **Validation:** Checks if at least one update (Status or Assignee) is requested.
    If the status is `Select One` and no assignee is provided, it raises a parameter
    error.

    3. **User Lookup:** If an assignee email is provided, the action calls the CrowdStrike
    API to retrieve the corresponding User UUID.

    4. **Update Execution:** Sends a PATCH request to the CrowdStrike Falcon `detects/entities/detects/v2`
    endpoint with the specified Detection ID, the new status (if provided), and the
    User UUID (if provided).

    5. **Finalization:** Reports success if the API call completes without error,
    otherwise logs the failure reason.
