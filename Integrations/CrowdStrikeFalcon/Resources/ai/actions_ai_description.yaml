Update Incident:
  ai_description: >-
    ### General Description

    Updates the status and assignment details of an existing incident in CrowdStrike
    Falcon. This action allows analysts to programmatically manage incident lifecycles
    by changing their state (e.g., from 'New' to 'In Progress' or 'Closed') and assigning
    or unassigning analysts. It is primarily used for workflow synchronization between
    Google SecOps and CrowdStrike.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Customer ID** | String | No | The ID of the customer for which to execute
    the action. If provided, the 'Assign to' parameter must also be populated. |

    | **Incident ID** | String | Yes | The unique identifier of the CrowdStrike incident
    that needs to be updated. |

    | **Status** | Dropdown | No | The new status for the incident. Options include:
    'Closed', 'In Progress', 'New', and 'Reopened'. |

    | **Assign to** | String | No | The name or email of the analyst to whom the incident
    should be assigned. Use 'Unassign' to remove the current assignment. For names,
    use the format '{first name} {last name}'. |


    ### Additional Notes

    - At least one of the parameters **Status** or **Assign to** must be provided
    for the action to execute successfully.

    - If a **Customer ID** is specified, the **Assign to** parameter becomes required
    by the logic.

    - This action is marked as deprecated in the metadata but remains functional for
    updating incident metadata.


    ### Flow Description

    1. **Initialization**: The action initializes the CrowdStrike manager using the
    provided API credentials and configuration.

    2. **Validation**: It checks that at least one update (Status or Assignee) is
    requested and validates the conditional requirement between Customer ID and Assignee.

    3. **Incident Verification**: The action verifies that the specified Incident
    ID exists in the CrowdStrike environment.

    4. **Update Execution**: It sends a request to the CrowdStrike API to update the
    incident's status and/or assignment based on the input parameters.

    5. **Data Retrieval**: After the update, it fetches the latest state of the incident
    and returns the updated details as a JSON result.
