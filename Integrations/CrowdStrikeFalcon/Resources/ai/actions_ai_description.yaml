Update Alert:
  ai_description: >-
    Updates the status, verdict, and assignment of a specific alert in CrowdStrike
    Falcon. This action allows analysts to programmatically manage the lifecycle of
    detections within the CrowdStrike console directly from Google SecOps.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Alert ID** | String | Yes | The unique identifier (Composite ID) of the alert
    in CrowdStrike that needs to be updated. |

    | **Status** | DDL | No | The new status to assign to the alert. Options include:
    `Closed`, `In Progress`, `New`, `Reopened`. |

    | **Verdict** | DDL | No | The verdict to apply to the alert. Options include:
    `True Positive`, `False Positive`. |

    | **Assign To** | String | No | The name of the analyst to whom the alert should
    be assigned. Providing "Unassign" will remove the current assignment. |


    ### Additional Notes

    - At least one of the optional parameters (**Status**, **Verdict**, or **Assign
    To**) must be provided for the action to execute.

    - The action performs a validation check to ensure the alert exists before attempting
    the update.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the Alert ID and the desired update values
    (Status, Verdict, Assign To).

    2. **Validation**: Ensures that at least one update field is populated and validates
    the DDL selections.

    3. **Pre-update Verification**: Fetches the current details of the alert from
    CrowdStrike to confirm its existence.

    4. **Update Execution**: Sends a PATCH request to the CrowdStrike API to update
    the alert's metadata based on the provided parameters.

    5. **Result Retrieval**: Fetches the updated alert details to confirm the changes
    and returns the full alert object as JSON results.
