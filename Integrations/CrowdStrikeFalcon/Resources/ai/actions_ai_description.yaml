Execute Command:
  ai_description: >-
    ### General Description

    Executes commands on remote hosts using CrowdStrike Falcon's Real-Time Response
    (RTR) capabilities. This action allows security analysts to perform live investigations
    or remediation tasks directly on endpoints by sending commands through the CrowdStrike
    agent. It supports targeting both IP Address and Hostname entities.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Customer ID | String | No | The specific Customer ID (CID) to use for the request.
    If not provided, the default integration CID is used. |

    | Command | String | Yes | The specific RTR command to be executed on the target
    hosts (e.g., 'ls', 'ps', 'get'). |

    | Admin Command | Boolean | No | If enabled, the command is executed with administrative
    privileges. This is required for certain high-privilege commands like 'put'. |

    | Hostname | String | No | A comma-separated list of additional hostnames to target.
    The action will run on these hostnames in addition to any Hostname or IP Address
    entities in the case. |


    ### Additional Notes

    - The action is asynchronous and will poll CrowdStrike until the command execution
    is complete or a timeout occurs.

    - Only hosts that are currently 'online' and in a 'normal' status will be targeted.

    - If multiple devices are found for a single entity, the first online device will
    be used.


    ### Flow Description

    1. **Target Identification**: The action identifies target hosts from both the
    case entities (IPs and Hostnames) and the 'Hostname' parameter.

    2. **Device Validation**: For each target, it searches the CrowdStrike environment
    to find the corresponding device ID and checks if the device is currently online
    and in a normal state.

    3. **Session Initiation**: It creates a Real-Time Response (RTR) session for each
    online device.

    4. **Command Execution**: The specified command is sent to the active session.
    If 'Admin Command' is true, it uses the admin-level API endpoint.

    5. **Status Polling**: The action enters an asynchronous state, periodically checking
    the status of the command execution via the cloud request ID.

    6. **Result Retrieval**: Once the command completes, the action retrieves the
    output (stdout/stderr) and returns it as JSON results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Executes arbitrary commands on remote hosts via CrowdStrike Real-Time Response
      (RTR), which can modify the state of the target endpoint (e.g., deleting files,
      stopping processes, or modifying configurations).
    fetches_data: true
    internal_data_mutation_explanation: null
