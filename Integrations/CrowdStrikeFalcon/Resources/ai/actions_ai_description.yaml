Update Identity Protection Detection:
  ai_description: >-
    Updates an identity protection detection in CrowdStrike Falcon. This action allows
    analysts to modify the status and assignment of a specific detection identified
    by its ID. It requires an Identity Protection license within the CrowdStrike environment.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Detection ID** | String | Yes | The unique identifier of the detection that
    needs to be updated. |

    | **Status** | Dropdown | No | The new status to assign to the detection. Options
    include: `New`, `In Progress`, `Closed`, `Reopened`. |

    | **Assign To** | String | No | The name of the analyst to whom the detection
    should be assigned. Providing "Unassign" will remove the current assignment. |


    ### Additional Notes

    - At least one of the optional parameters (**Status** or **Assign To**) must be
    provided for the action to execute.

    - The action performs a verification step to ensure the detection ID exists before
    attempting the update.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the Detection ID, Status, and Assignee
    from the action input.

    2. **Validation:** Checks that at least one update field (Status or Assign To)
    is populated.

    3. **Existence Check:** Queries the CrowdStrike API to verify that the provided
    Detection ID is valid and exists.

    4. **Update Execution:** Sends a PATCH request to the CrowdStrike Falcon API to
    update the detection's metadata.

    5. **Result Retrieval:** Fetches the updated detection details and attaches them
    as a JSON result to the action output.
