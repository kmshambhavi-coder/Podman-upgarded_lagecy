  ai_description: >-
    ### General Description

    The **On-Demand Scan** action allows security analysts to initiate and monitor
    malware scans on specific Windows endpoints or host groups directly from Google
    SecOps using the CrowdStrike Falcon platform. This action is particularly useful
    during incident response to verify the presence of threats on a host or to perform
    a targeted sweep of specific file paths. It operates asynchronously, meaning it
    triggers the scan and then periodically polls CrowdStrike for the completion status
    and results.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Customer ID** | String | No | The specific CrowdStrike Customer ID (CID) to
    use for the action. If not provided, the integration's default CID is used. |

    | **File Paths To Scan** | String | Yes | A comma-separated list of Windows file
    paths to include in the scan (e.g., `C:\Windows`). Default is `C:\Windows`. |

    | **File Paths To Exclude From Scan** | String | No | A comma-separated list of
    Windows file paths to ignore during the scan. |

    | **Host Group Name** | String | No | A comma-separated list of CrowdStrike Host
    Group names to initiate scans for. |

    | **Scan Description** | String | No | A custom description for the scan task.
    Defaults to "Scan initialized by Google SecOps." |

    | **CPU Priority** | Dropdown | No | Controls the CPU utilization limit on the
    target host (1% to 100%). Default is 25%. |

    | **Sensor Anti-malware Detection Level** | Dropdown | No | The detection sensitivity
    for the on-host sensor (Cautious to Extra Aggressive). |

    | **Sensor Anti-malware Prevention Level** | Dropdown | No | The prevention sensitivity
    for the on-host sensor. Must be equal to or lower than the Detection Level. |

    | **Cloud Anti-malware Detection Level** | Dropdown | No | The detection sensitivity
    for CrowdStrike's cloud-based analysis. |

    | **Cloud Anti-malware Prevention Level** | Dropdown | No | The prevention sensitivity
    for cloud-based analysis. Must be equal to or lower than the Detection Level.
    |

    | **Quarantine Hosts** | Boolean | No | If enabled, the target hosts will be network-quarantined
    during the scan. |

    | **Create Endpoint Notification** | Boolean | No | If enabled, a notification
    will be displayed to the end-user on the target machine. |

    | **Max Scan Duration** | Integer | No | The maximum time (in hours) the scan
    is allowed to run. Default is 1 hour. |

    | **Hostname** | String | No | A comma-separated list of additional hostnames
    to scan, supplementing the entities provided in the case. |


    ### Additional Notes

    - **Platform Support:** This action strictly supports **Windows** hosts. Non-Windows
    entities will be skipped.

    - **Validation:** The action validates that Detection levels are always equal
    to or higher than Prevention levels to comply with CrowdStrike API requirements.

    - **Deduplication:** Before starting a new scan, the action checks for existing
    active scans with the exact same configuration to avoid redundant tasks.


    ### Flow Description

    1. **Initialization:** Extracts configuration and validates that the provided
    file paths follow Windows naming conventions.

    2. **Entity Resolution:** Identifies target hosts from the case (IPs and Hostnames)
    and the manual `Hostname` parameter, then resolves them to CrowdStrike Device
    IDs.

    3. **Host Group Resolution:** If host group names are provided, it resolves them
    to their respective CrowdStrike IDs.

    4. **Scan Initiation:** Sends a request to CrowdStrike to start the on-demand
    scan with the specified ML levels, CPU priority, and file paths.

    5. **Asynchronous Polling:** The action enters an 'In Progress' state, periodically
    checking the status of the scan (Pending, Running, or Completed).

    6. **Result Retrieval:** Once the scan reaches a 'Completed' state, the action
    retrieves the final file counts (scanned, malicious, skipped) and metadata.

    7. **Finalization:** Outputs the scan results as JSON and completes the action.
