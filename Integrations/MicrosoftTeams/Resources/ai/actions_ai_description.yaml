Remove Users From Channel:
  ai_description: >-
    Removes users from a specific private channel within a Microsoft Team. This action
    is designed to manage channel membership by identifying users based on their display
    names or email addresses and removing them from the target private channel.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Team Name | String | Yes | The display name of the Microsoft Team containing
    the channel. |

    | Channel Name | String | Yes | The display name of the private channel from which
    users should be removed. |


    ### Additional Notes

    - **Private Channels Only**: This action explicitly checks if the channel's membership
    type is 'private'. It will fail if the specified channel is a standard (public)
    channel.

    - **Entity Matching**: The action attempts to match entities against current channel
    members using both display names and email addresses (case-insensitive).

    - **Permissions**: The integration must have sufficient Microsoft Graph API permissions
    (e.g., `ChannelMember.ReadWrite.All`) to manage memberships.


    ### Flow Description

    1. **Initialization**: Connects to the Microsoft Graph API using provided configuration
    parameters (Client ID, Secret, Tenant, etc.).

    2. **Team & Channel Discovery**: Retrieves the unique ID for the specified Team
    Name and then fetches the details for the specified Channel Name.

    3. **Validation**: Verifies that the target channel is a 'private' channel. If
    it is not, the action terminates with an error.

    4. **Member Mapping**: Fetches the current list of members in the channel to create
    a mapping of display names and emails to internal Microsoft User IDs.

    5. **Removal Logic**: Iterates through the provided User entities. If a user is
    found in the channel's member list, the action sends a DELETE request to the Microsoft
    Graph API to remove that user.

    6. **Reporting**: Aggregates results and provides a summary of users successfully
    removed, users not found in the channel, and any users that failed to be removed
    due to API errors.
