Send User Message:
  ai_description: >-
    Sends a chat message to specific users in Microsoft Teams. This action can target
    users derived from Siemplify entities, manually provided identifiers, or both.
    It supports sending messages in either plain text or HTML format. A key feature
    is the asynchronous 'Wait For Reply' mode, which allows the action to pause and
    poll for a response from the recipient before finalizing the execution result.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | User Identifiers | String | No | A comma-separated list of user identifiers
    (emails or usernames) to receive the message. Mandatory if 'User Selection' is
    set to 'From User Identifiers'. |

    | Text | String | Yes | The actual content of the message to be sent. |

    | Wait For Reply | Boolean | No | If enabled (true), the action will run asynchronously
    and wait for a response from the user in the Teams chat. |

    | Content Type | Dropdown | No | Specifies if the message body is 'Text' or 'HTML'.
    Defaults to 'Text'. |

    | User Selection | Dropdown | No | Determines the source of recipients: 'From
    Entities', 'From User Identifiers', or 'From Entities & User Identifiers'. |


    ### Flow Description


    1.  **Recipient Identification:** The action identifies target users based on
    the 'User Selection' logic, filtering Siemplify entities for User types and/or
    parsing the 'User Identifiers' parameter.

    2.  **Session Management:** For each recipient, the action checks for an existing
    1:1 chat. If none exists, it searches for the user's ID and creates a new chat
    session.

    3.  **Message Dispatch:** The message is sent to the identified chat using the
    specified content type.

    4.  **Async Polling (Optional):** If 'Wait For Reply' is enabled, the action enters
    an 'In Progress' state. It periodically polls the Microsoft Graph API to check
    for new messages in the chat sent by the recipient after the initial message.

    5.  **Completion:** Once replies are received (or the action times out), the results
    are aggregated and returned to the SOAR platform.
