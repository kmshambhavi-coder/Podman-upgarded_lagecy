Get Authorization:
  ai_description: >-
    Generates a Microsoft OAuth 2.0 authorization URL to initiate the authentication
    process for the Microsoft Teams integration. This action is the first step in
    a two-step manual OAuth flow, providing a link that the user must visit to grant
    permissions and obtain an authorization code.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Client ID | String | Yes | The Application (client) ID assigned to your app
    in the Azure portal. |

    | Tenant | String | Yes | The Directory (tenant) ID or domain name of your Azure
    AD instance. |

    | Redirect URL | String | No | The URI where the Microsoft identity platform redirects
    the user after authentication. |

    | Login API Root | String | No | The base URL for the Microsoft login service
    (defaults to `https://login.microsoftonline.com`). |

    | API Root | String | No | The base URL for the Microsoft Graph API (defaults
    to `https://graph.microsoft.com`). |


    ### Additional Notes

    - This action does not perform any API calls to Microsoft; it only constructs
    a URL string based on the provided parameters.

    - After running this action, the user must manually browse to the generated link,
    log in, and then copy the resulting URL (containing the code) to use in the 'Generate
    Token' action.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the Client ID, Tenant ID, and
    optional URL overrides from the integration configuration.

    2. **URL Generation:** It constructs a formatted OAuth 2.0 authorization URL using
    the `generate_auth_url` helper, incorporating the required scopes (e.g., `https://graph.microsoft.com/.default`).

    3. **Result Attachment:** The generated URL is added to the Google SecOps action
    results as a clickable link labeled 'Browse to this authorization link'.

    4. **Instructional Output:** The action provides a success message instructing
    the user on how to proceed with the 'Generate Token' action to complete the authentication
    setup.
