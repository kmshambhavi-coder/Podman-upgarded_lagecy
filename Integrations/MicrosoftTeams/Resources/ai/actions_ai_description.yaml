Delete Channel:
  ai_description: >-
    ### General Description

    The **Delete Channel** action programmatically removes a specific channel from
    a Microsoft Teams team. This action is primarily used for automated lifecycle
    management of communication channels, such as cleaning up temporary incident response
    channels after a case is closed.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Team Name** | String | Yes | The display name of the Microsoft Team where
    the channel is located. |

    | **Channel Name** | String | Yes | The display name of the channel that needs
    to be deleted. |


    ### Flow Description

    1. **Authentication**: The action authenticates with the Microsoft Graph API using
    the provided integration credentials (Client ID, Secret, Tenant, and Refresh Token).

    2. **Team Identification**: It retrieves the unique Team ID by searching for the
    provided `Team Name`.

    3. **Channel Identification**: It retrieves the unique Channel ID within the identified
    team by searching for the provided `Channel Name`.

    4. **Deletion Execution**: If the channel is found, the action sends a DELETE
    request to the Microsoft Teams API to remove the channel.

    5. **Error Handling**: If the channel already does not exist, the action completes
    successfully. If the team is not found or an API error occurs, the action fails
    with a descriptive error message.


    ### Additional Notes

    - This action does not run on entities; it relies entirely on the provided string
    parameters for the Team and Channel names.
