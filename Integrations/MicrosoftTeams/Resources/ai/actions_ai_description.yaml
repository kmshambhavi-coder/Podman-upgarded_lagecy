  ai_description: "The 'Generate Token' action is a utility task for the Microsoft\
    \ Teams integration designed to complete the OAuth 2.0 authorization flow. It\
    \ extracts an authorization code from a provided URL and exchanges it for a long-lived\
    \ refresh token. This refresh token is then used by the integration to maintain\
    \ persistent access to the Microsoft Graph API. \n\n### Parameters\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Authorization\
    \ URL | String | Yes | The full URL received after the user grants consent in\
    \ the 'Get Authorization' step. This URL must contain the 'code' query parameter.\
    \ |\n\n### Flow Description\n1. **Parameter Extraction:** The action retrieves\
    \ integration configuration details (Client ID, Secret, Tenant, etc.) and the\
    \ user-provided Authorization URL.\n2. **URL Parsing:** It parses the Authorization\
    \ URL to locate and extract the 'code' parameter.\n3. **Token Exchange:** It performs\
    \ a POST request to the Microsoft identity platform's token endpoint using the\
    \ extracted code and the 'authorization_code' grant type.\n4. **Token Retrieval:**\
    \ Upon a successful response, it extracts the 'refresh_token'.\n5. **Output:**\
    \ The action returns the refresh token in the output message, instructing the\
    \ user to copy it into the integration settings. \n\n### Additional Notes\n* This\
    \ action does not run on entities.\n* The generated refresh token is typically\
    \ valid for 90 days.\n* This is a setup/configuration action rather than a security\
    \ investigation or response action."
