Ping:
  ai_description: >-
    ### General Description

    Verifies the connectivity between Google SecOps and the Microsoft Teams instance
    using the provided OAuth2 credentials. This action ensures that the integration
    is correctly configured and can successfully communicate with the Microsoft Graph
    API by attempting to refresh the authentication token.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Client ID | String | Yes | The Application (client) ID from the Azure App Registration
    portal. |

    | Secret ID | String | Yes | The client secret generated in the Azure App Registration
    portal. |

    | Tenant | String | Yes | The Azure AD tenant ID or domain name. |

    | Refresh Token | String | Yes | The long-lived OAuth2 refresh token used to generate
    short-lived access tokens. |

    | Redirect URL | String | No | The redirect URI configured in the Azure portal
    for the application. |

    | Verify SSL | Boolean | No | Whether to verify the SSL certificate of the API
    endpoints. Defaults to False. |

    | Login API Root | String | No | The base URL for the Microsoft identity platform
    (login service). Defaults to `https://login.microsoftonline.com`. |

    | API Root | String | No | The base URL for the Microsoft Graph API. Defaults
    to `https://graph.microsoft.com`. |


    ### Additional Notes

    - This action does not process or require any entities.

    - It specifically tests the OAuth2 token refresh flow, which is the primary authentication
    mechanism for the Microsoft Teams integration.

    - Note that Microsoft refresh tokens typically have a limited lifespan (e.g.,
    90 days); if the token is expired or revoked, this action will fail.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the integration configuration
    and action-specific parameters, including credentials and API endpoint roots.

    2. **Manager Initialization**: It initializes the `MicrosoftTeamsManager` class
    using the provided configuration.

    3. **Connectivity Test**: During the initialization of the manager, a `refresh_token`
    call is automatically executed. This sends a POST request to the Microsoft identity
    platform to exchange the refresh token for a new access token.

    4. **Validation**: If the API returns a valid access token and a new refresh token,
    the connectivity is confirmed, and the action completes successfully. If the API
    returns an error (e.g., due to invalid credentials or an expired token), the action
    catches the exception and reports a failure.
