Add Users To Channel:
  ai_description: >-
    ### General Description

    The **Add Users To Channel** action allows security teams to automatically add
    users to a specific private channel within Microsoft Teams. This is particularly
    useful for incident response scenarios where a dedicated, restricted communication
    channel needs to be populated with relevant stakeholders or investigators based
    on user entities identified in a case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Team Name** | String | Yes | The exact display name of the Microsoft Team
    where the channel resides. |

    | **Channel Name** | String | Yes | The exact display name of the private channel
    to which users will be added. |


    ### Additional Notes

    * **Private Channels Only:** This action is specifically designed for channels
    with a `membershipType` of 'private'. It will fail if the target channel is public.

    * **Team Membership Requirement:** Users must already be members of the parent
    Team to be successfully added to a private channel within that team.

    * **Entity Matching:** The action attempts to match User entities by their display
    name or email address against the Microsoft Teams user directory.


    ### Flow Description

    1. **Initialization:** The action retrieves integration configuration (Client
    ID, Secret, Tenant, etc.) and the target Team and Channel names.

    2. **Team & Channel Resolution:** It queries the Microsoft Graph API to find the
    unique ID for the specified Team and then retrieves the Channel details to ensure
    it exists and is private.

    3. **User Directory Mapping:** The action fetches a list of all users in the organization
    to create a mapping between identifiers (names/emails) and Microsoft User IDs.

    4. **Entity Processing:** For each User entity provided in the context, the action
    looks up the corresponding User ID.

    5. **Membership Update:** If a match is found, it performs a POST request to the
    Microsoft Graph API to add the user as a member of the private channel.

    6. **Reporting:** The action tracks successful additions, missing users, and failures
    (e.g., users not in the team), providing a detailed summary in the output message.
