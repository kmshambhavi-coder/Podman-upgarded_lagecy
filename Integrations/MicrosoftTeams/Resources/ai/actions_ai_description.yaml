List Channels:
  ai_description: >-
    ### General Description

    The **List Channels** action retrieves detailed information about all channels
    within a specific Microsoft Teams team. This action is primarily used for discovery
    and auditing, allowing users to see the structure of a team, including channel
    names, IDs, and descriptions. It is a read-only operation that does not modify
    any data in Microsoft Teams or Google SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Team Name | String | Yes | The display name of the Microsoft Team from which
    to retrieve the channels. |

    | Max Channels To Return | Integer | No | Limits the number of channel objects
    returned in the result. Must be a positive integer. Default is 50. |


    ### Additional Notes

    - This action does not process or interact with entities (such as IPs, Hostnames,
    or Users) present in the Google SecOps case. It relies solely on the provided
    'Team Name' parameter.

    - If the specified team is not found or has no channels, the action will report
    that no results were found.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the 'Team Name' and the optional
    'Max Channels To Return' limit from the input.

    2. **Validation:** It verifies that the 'Max Channels To Return' is greater than
    0.

    3. **Team Identification:** The action calls the Microsoft Graph API to resolve
    the provided 'Team Name' into a unique Team ID.

    4. **Channel Retrieval:** Using the Team ID, the action fetches the list of all
    associated channels from the Microsoft Teams environment.

    5. **Data Output:** The retrieved channel details are formatted as a JSON object
    and returned as the action's result for use in subsequent playbook steps.
