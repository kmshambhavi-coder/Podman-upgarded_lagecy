    \ Teams chat. This action allows for direct communication within Teams and can\
    \ optionally wait for a reply from another user, making it suitable for interactive\
    \ workflows or manual confirmations within a SOAR playbook.\n\n### Parameters\
    \ Description\n| Parameter | Type | Mandatory | Description |\n| :--- | :--- |\
    \ :--- | :--- |\n| Chat ID | String | Yes | The unique identifier of the Microsoft\
    \ Teams chat where the message will be sent. |\n| Text | String | Yes | The content\
    \ of the message to be sent. |\n| Wait For Reply | Boolean | No | If enabled (default\
    \ is true), the action will run asynchronously and wait for a response from a\
    \ different user in the chat before completing. |\n\n### Additional Notes\n- **Async\
    \ Execution:** If \"Wait For Reply\" is enabled, the action will enter an 'In\
    \ Progress' state after sending the message. It will periodically poll the chat\
    \ for a response.\n- **Timeout:** Users should adjust the script timeout in the\
    \ Google SecOps IDE if waiting for a reply, as the default might be too short\
    \ for human response times. If a timeout occurs while waiting, the action will\
    \ fail gracefully with a notification.\n- **Reply Logic:** The action identifies\
    \ a reply as the first message sent in the chat after the original message that\
    \ has a different sender ID.\n\n### Flow Description\n1. **Initialization:** The\
    \ action initializes the Microsoft Teams manager using the provided integration\
    \ configuration (Client ID, Secret, Tenant, etc.).\n2. **Message Dispatch:** In\
    \ the first run, it sends the specified text to the target Chat ID using the Microsoft\
    \ Graph API.\n3. **Conditional Async State:** \n    - If \"Wait For Reply\" is\
    \ **False**, the action completes immediately after sending the message.\n   \
    \ - If \"Wait For Reply\" is **True**, the action saves the original message metadata\
    \ and enters an asynchronous state.\n4. **Polling (Async Mode):** In subsequent\
    \ runs, the action fetches the latest messages from the chat.\n5. **Reply Detection:**\
    \ It searches for the first message appearing after the original message's timestamp\
    \ that was sent by a different user.\n6. **Completion:** Once a reply is detected,\
