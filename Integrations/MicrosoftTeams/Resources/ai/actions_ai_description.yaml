Create Channel:
  ai_description: >-
    ### General Description

    Creates a new channel within a specified Microsoft Teams team. This action allows
    for the automated setup of communication channels for incident response, collaboration,
    or notification purposes directly from a Google SecOps playbook.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Team Name | String | Yes | The display name of the team in which the channel
    should be created. |

    | Channel Name | String | Yes | The unique name for the new channel. |

    | Channel Type | String | Yes | The type of channel to create. 'Standard' is accessible
    to all team members, while 'Private' requires specific users to be added. |

    | Description | String | No | An optional description for the channel's purpose.
    |


    ### Flow Description

    1. **Authentication**: Initializes the Microsoft Teams manager using the provided
    integration configuration (Client ID, Secret, Tenant, etc.).

    2. **Team Identification**: Retrieves the unique Team ID by searching for the
    provided 'Team Name'.

    3. **Channel Creation**: Sends a POST request to the Microsoft Graph API to create
    a new channel with the specified name, membership type, and description.

    4. **Result Processing**: Returns the metadata of the newly created channel as
    a JSON result and provides a success message.


    ### Additional Notes

    - The action will fail if the specified 'Team Name' cannot be found in the Microsoft
    Teams environment.

    - 'Standard' and 'Private' are the only supported channel types.
