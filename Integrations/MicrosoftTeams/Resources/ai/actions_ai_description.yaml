List Chats:
  ai_description: >-
    ### General Description

    The **List Chats** action retrieves a list of available chat conversations from
    Microsoft Teams for the authenticated user. This action is designed to provide
    visibility into existing communication channels, allowing analysts to find specific
    group chats, meeting chats, or one-on-one conversations based on various criteria.
    It supports both server-side filtering for chat types and client-side filtering
    for specific attributes like topics or member details.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Chat Type** | Dropdown | No | Specifies the category of chats to retrieve.
    Options include `All`, `Group Chat`, `Meeting Chat`, and `One on One Chat`. Default
    is `All`. |

    | **Filter Key** | Dropdown | No | The attribute used to filter the results. Options
    include `Topic`, `Member Display Name`, and `Member Email`. |

    | **Filter Logic** | Dropdown | No | The comparison logic for the filter. Options
    are `Equal` (exact match) or `Contains` (substring match). |

    | **Filter Value** | String | No | The string value to search for using the selected
    Filter Key and Logic. |

    | **Max Records To Return** | Integer | No | Limits the number of chat objects
    returned in the results. Defaults to 50. |


    ### Additional Notes

    - **Filter Dependencies**: If `Filter Logic` is set to `Equal` or `Contains`,
    the `Filter Key` must be set to something other than `Select One`. If a `Filter
    Value` is missing when logic is applied, the filter is ignored.

    - **Entity Support**: This action does not run on specific SOAR entities; it retrieves
    data globally for the configured user account.

    - **Pagination**: The action handles API pagination automatically to reach the
    requested `Max Records To Return` limit.


    ### Flow Description

    1. **Initialization**: The action extracts Microsoft Graph API credentials (Client
    ID, Secret, Tenant, Refresh Token) and user-defined filter parameters.

    2. **Validation**: It ensures the `Max Records To Return` is a positive integer
    and checks for valid filter configurations.

    3. **API Request**: It calls the Microsoft Graph `/me/chats` endpoint. If a `Chat
    Type` is specified, it applies an OData `$filter` (e.g., `chatType eq 'group'`).
    It also uses `$expand=members` to retrieve participant details.

    4. **Local Filtering**: The script iterates through the retrieved chats and applies
    the user-defined `Filter Key` and `Filter Logic` (Equal or Contains) against the
    chat's topic or member list.

    5. **Result Generation**: The filtered list of chats is converted into a JSON
    result and a formatted data table for display in the Google SecOps case wall.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
