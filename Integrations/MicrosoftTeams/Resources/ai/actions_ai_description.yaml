Get User Details:
  ai_description: >-
    ### General Description

    The **Get User Details** action retrieves the comprehensive properties and relationships
    of a specific user from Microsoft Teams using the Microsoft Graph API. This action
    is primarily used for identity enrichment, allowing security analysts to gather
    context such as job titles, department affiliations, account status, and contact
    details for a given identifier.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Username** | String | Yes | The identifier of the user to retrieve. This can
    be the user's **Display Name**, **User Principal Name (UPN)**, or **Email Address**.
    |


    ### Flow Description

    1. **Authentication**: The action initializes a connection to the Microsoft Graph
    API using the integration's configured Client ID, Secret, Tenant, and Refresh
    Token.

    2. **User Resolution**: It searches for the user's unique Microsoft ID by querying
    the Graph API and matching the provided `Username` against display names, UPNs,
    and email addresses.

    3. **Data Retrieval**: Upon finding a valid ID, the action performs a secondary
    request to fetch the full user profile and associated metadata.

    4. **Result Processing**: The retrieved data is flattened and output as a Data
    Table in the action results. The raw JSON response is also attached for use in
    subsequent playbook steps.


    ### Additional Notes

    - This action does not automatically iterate over entities in the Google SecOps
    case; it relies strictly on the value provided in the `Username` parameter.

    - If no matching user is found, the action will complete successfully but will
    report that no details were found.
