Wait For Reply:
  ai_description: >-
    Waits for a reply to a specific message in a Microsoft Teams channel. This is
    an asynchronous action that polls for new replies and compares them against an
    optional expected string. It is useful for automated workflows that require human
    intervention or confirmation via Teams.


    ### Flow Description:

    1. **Initialization**: Authenticates with the Microsoft Graph API using provided
    credentials and resolves the Team and Channel names to their respective unique
    IDs.

    2. **Data Retrieval**: Periodically fetches all replies associated with the specified
    `Message ID` from the target channel.

    3. **Evaluation**: Processes the retrieved replies based on the selected `Wait
    Method`:
        * **Check First Reply**: Evaluates only the most recent reply. If it matches
    the `Expected Reply` (or if no expected reply is defined), the action completes.
        * **Wait Till Timeout**: Scans all replies received since the action started.
    If any reply matches the `Expected Reply`, the action completes. If no match is
    found, it continues polling until the global timeout is reached.
    4. **Completion**: Returns the matching message(s) in the JSON result and updates
    the action status to completed or timed out.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Team Name | String | Yes | The display name of the Microsoft Team where the
    message resides. |

    | Channel Name | String | Yes | The display name of the channel within the team.
    |

    | Message ID | String | Yes | The unique identifier of the parent message to monitor
    for replies. |

    | Expected Reply | String | No | The specific text string to look for in the replies.
    If left empty, the action will succeed on the first reply received. |

    | Wait Method | Dropdown | No | Determines the logic for success: 'Check First
    Reply' (looks at the latest message) or 'Wait Till Timeout' (looks for a match
    across all messages until the timeout). Defaults to 'Check First Reply'. |


    ### Additional Notes:

    * This action is **Async**, meaning it will run in the background and poll the
    API until the condition is met or the SOAR script timeout is reached.

    * Ensure the integration user has the necessary permissions to read messages in
    the specified team and channel.
