Create Chat:
  ai_description: >-
    ### General Description

    Creates a one-on-one chat conversation in Microsoft Teams between the authenticated
    service account and specified User entities. This action is useful for initiating
    direct communication with users during an incident response process, such as for
    verification or notification purposes.


    ### Parameters Description

    This action does not have any action-specific parameters. It relies on the following
    integration configuration parameters:


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Client ID | String | Yes | The Application (client) ID for the app registration
    in the Azure portal. |

    | Secret ID | String | Yes | The client secret for the app registration. |

    | Tenant | String | Yes | The Directory (tenant) ID or domain name of the Azure
    AD instance. |

    | Refresh Token | String | Yes | The OAuth2 refresh token used to generate access
    tokens for API calls. |

    | Redirect URL | String | No | The redirect URI specified in the app registration.
    |

    | Verify SSL | Boolean | No | If enabled, the action will verify the SSL certificate
    of the API. Default is False. |

    | Login API Root | String | No | The base URL for the Microsoft login service.
    Default is `https://login.microsoftonline.com`. |

    | API Root | String | No | The base URL for the Microsoft Graph API. Default is
    `https://graph.microsoft.com`. |


    ### Additional Notes

    * The action requires the Microsoft Teams integration to be properly configured
    with an OAuth2 refresh token that has permissions to list users and manage chats.

    * It attempts to match the entity identifier against both the `displayName` and
    `mail` (email) attributes of users in the Microsoft Teams tenant.

    * A chat will be created for each successfully matched user entity.


    ### Flow Description

    1. **Authentication**: The action initializes the Microsoft Teams Manager using
    the provided configuration and refreshes the OAuth2 access token.

    2. **User Discovery**: It retrieves a complete list of users from the Microsoft
    Teams tenant to build a mapping of display names and email addresses to internal
    Microsoft IDs.

    3. **Self-Identification**: The action identifies the unique ID of the authenticated
    service account to include it as a participant in the chat.

    4. **Entity Filtering**: It identifies all `USERUNIQNAME` entities within the
    current alert context.

    5. **User Matching**: For each entity, the action checks if the identifier matches
    a known user's display name or email address in the retrieved mapping.

    6. **Chat Creation**: If a match is found, the action sends a POST request to
    the Microsoft Graph API to create a new one-on-one chat between the service account
    and the target user.

    7. **Result Aggregation**: The action collects the chat details for successful
    matches and identifies any users that were not found or encountered errors during
    the process, providing a summary message and JSON results.
