Add Threat Note:
  ai_description: >-
    Adds a text note to a specific threat in the SentinelOne console. This action
    is used by analysts to document findings, record investigation steps, or provide
    context directly within the SentinelOne platform for a given threat ID.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Threat ID | String | Yes | The unique identifier of the threat in SentinelOne
    to which the note will be added. |

    | Note | String | Yes | The actual text content of the note to be attached to
    the threat. |


    ### Flow Description


    1. **Authentication**: The action initializes a connection to the SentinelOne
    API using the provided API Root and API Token.

    2. **Parameter Extraction**: It retrieves the 'Threat ID' and the 'Note' text
    from the action's input parameters.

    3. **API Interaction**: The action sends a POST request to the SentinelOne `/web/api/v2.1/threats/notes`
    endpoint, passing the threat ID in the filter and the note text in the data payload.

    4. **Result Validation**: It checks the API response to confirm if the note was
    successfully added (checking the 'affected' count) and returns a success or failure
    message to the Google SecOps case wall.
