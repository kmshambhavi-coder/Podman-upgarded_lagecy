Get Hash Reputation:
  ai_description: >-
    Retrieves reputation information for File Hash entities from SentinelOne. This
    action queries the SentinelOne API to obtain a reputation rank (0-10) for each
    hash and uses a configurable threshold to determine if the entity should be marked
    as suspicious within the SOAR. It enriches the entity with reputation data and
    can optionally generate insights based on the findings.


    ### Parameters

    | Parameter | Type | Mandatory | Default | Description |

    | :--- | :--- | :--- | :--- | :--- |

    | Reputation Threshold | Integer | No | 5 | The rank (0-10) at which a hash is
    considered suspicious. If the retrieved rank is equal to or higher than this value,
    the entity is marked as suspicious. |

    | Create Insight | Boolean | No | True | If enabled, the action will create an
    entity insight containing the reputation rank. |

    | Only Suspicious Hashes Insight | Boolean | No | True | If enabled, insights
    will only be generated for hashes that meet or exceed the 'Reputation Threshold'.
    |


    ### Flow Description

    1. **Initialization**: Retrieves API credentials and action parameters, including
    the reputation threshold and insight preferences.

    2. **Entity Filtering**: Identifies all `FILEHASH` entities within the current
    scope.

    3. **Reputation Retrieval**: For each hash, it calls the SentinelOne API to fetch
    its reputation rank.

    4. **Risk Assessment**: Compares the retrieved rank against the `Reputation Threshold`.
    If the rank is higher or equal, the entity is flagged as suspicious.

    5. **Enrichment & Insights**: Updates the entity's additional properties with
    the reputation data. If configured, it generates a SOAR insight for the entity.

    6. **Internal Update**: Commits the changes (suspicious status and enrichment
    data) to the SOAR entities.
