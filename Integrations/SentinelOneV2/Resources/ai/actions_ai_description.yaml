Initiate Deep Visibility Query:
  ai_description: >-
    ### General Description

    Initiates a Deep Visibility Query search in SentinelOne. This action is used to
    start a historical telemetry search (EDR) based on a provided S1QL query string.
    It returns a `query_id`, which is required as an input for the 'Get Deep Visibility
    Query Result' action to retrieve the actual event data once the query completes.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Query | String | Yes | The specific S1QL query string to execute for the search.
    |

    | Start Date | String | No | The start date for the search window (Format: YYYY-MM-DDTHH:MM:SS.mmmZ).
    If not specified, the action defaults to 30 days before the End Date. |

    | End Date | String | No | The end date for the search window (Format: YYYY-MM-DDTHH:MM:SS.mmmZ).
    If not specified, the action defaults to the current UTC time. |


    ### Additional Notes

    - This action does not return the search results immediately; it only starts the
    query process in the SentinelOne console.

    - The search window is limited by the retention period configured in the SentinelOne
    environment.


    ### Flow Description

    1. **Initialization:** The action extracts the API configuration and the user-provided
    search parameters.

    2. **Timeframe Calculation:** If the `End Date` is missing, it uses the current
    UTC time. If the `Start Date` is missing, it calculates a timestamp 30 days prior
    to the `End Date`.

    3. **API Request:** The action communicates with the SentinelOne manager to call
    the `init-query` endpoint with the specified query and timeframe.

    4. **Output:** Upon success, the action retrieves the `query_id` from the API
    response and saves it into the action's JSON results for use in subsequent playbook
    steps.
