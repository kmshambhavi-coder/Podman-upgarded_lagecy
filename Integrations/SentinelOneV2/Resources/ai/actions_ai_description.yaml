    the integration's global configuration (Api Root, API Token, and Verify SSL).


    ### Additional Notes

    This action is typically used during the initial setup of the integration or for
    troubleshooting communication issues. Per Google SecOps standards, Ping actions
    are not categorized as enrichment actions.


