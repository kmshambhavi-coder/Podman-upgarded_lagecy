Update Device Control Rule:
  ai_description: >-
    ### General Description

    Updates an existing Device Control Rule in SentinelOne. This action allows security
    administrators to modify the configuration of a specific rule by providing its
    unique identifier and a JSON object containing the updated parameters. It is primarily
    used for managing device access policies (e.g., USB, Bluetooth) across the environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Rule ID | String | Yes | The unique identifier of the Device Control Rule that
    needs to be updated in SentinelOne. |

    | Rule JSON | String | Yes | A JSON-formatted string representing the updated
    configuration of the rule. It typically includes fields such as `ruleName`, `interface`,
    `ruleType`, `action`, `accessPermission`, `deviceClass`, and `status`. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the Rule ID and the Rule JSON
    configuration from the input parameters.

    2. **JSON Validation**: The action validates that the `Rule JSON` parameter is
    a valid JSON string before proceeding.

    3. **API Client Initialization**: The SentinelOne V2 manager is initialized using
    the provided API root and token.

    4. **External Update**: The action sends a PUT request to the SentinelOne API
    endpoint `/web/api/v2.1/device-control/{rule_id}` with the updated rule data.

    5. **Result Handling**: The action captures the API response (the updated rule
    object), populates the JSON results, and provides a success message.


    ### Additional Notes

    - This action does not run on entities (e.g., Hostnames or IPs) but rather targets
    a specific rule ID within the SentinelOne management console.

    - The `Rule JSON` must conform to the SentinelOne API schema for Device Control
    rules.
