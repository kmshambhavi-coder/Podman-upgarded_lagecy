Create Hash Exclusion Record:
  ai_description: >-
    Adds file hash entities to the exclusion list (whitelist) in SentinelOne to prevent
    them from being flagged or blocked. This action supports SHA1 hashes and allows
    for granular scoping or global application.


    ### Flow Description:

    1. **Parameter Extraction:** The action retrieves connection details and user-defined
    parameters including the target Operating System, scoping IDs (Site, Group, Account),
    and the global exclusion flag.

    2. **Entity Filtering:** It identifies all `FILEHASH` entities within the current
    context.

    3. **Validation:** It ensures that at least one scope is provided (either specific
    IDs or the global flag enabled).

    4. **Exclusion Creation:** For each valid hash, it sends a request to SentinelOne
    to create a 'white_hash' exclusion record with the specified OS type and description.

    5. **Result Processing:** It tracks which hashes were successfully added, which
    already existed in the exclusion list, and which failed, providing a summary and
    detailed JSON results.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Operation System** | String | Yes | Specifies the OS for the hash. Supported
    values: `windows`, `windows_legacy`, `macos`, `linux`. |

    | **Site IDs** | String | No | A comma-separated list of SentinelOne Site IDs
    where the hash should be excluded. |

    | **Group IDs** | String | No | A comma-separated list of SentinelOne Group IDs
    where the hash should be excluded. |

    | **Account IDs** | String | No | A comma-separated list of SentinelOne Account
    IDs where the hash should be excluded. |

    | **Description** | String | No | Additional context or notes to attach to the
    exclusion record. |

    | **Add to global exclusion list** | Boolean | No | If enabled, the hash is added
    to the global exclusion list, and specific Site, Group, or Account IDs are ignored.
    |


    ### Additional Notes:

    * **SHA1 Requirement:** SentinelOne typically requires SHA1 hashes for exclusion
    records.

    * **Scope Requirement:** The action will fail if no scope is defined. You must
    either provide at least one ID (Site, Group, or Account) or enable the 'Add to
    global exclusion list' parameter.
  capabilities:
    can_create_case_comments: false
