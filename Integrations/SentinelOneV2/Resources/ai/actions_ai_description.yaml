Update Analyst Verdict:
  ai_description: >-
    Updates the analyst verdict for specific threats in SentinelOne. This action allows
    users to programmatically classify threats as True Positive, False Positive, Suspicious,
    or Undefined. It is useful for synchronizing the investigation status between
    Google SecOps and the SentinelOne console.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Threat ID | String | Yes | A comma-separated list of SentinelOne threat identifiers
    to be updated. |

    | Analyst Verdict | Dropdown | Yes | The verdict to apply to the threats. Options
    include: 'False Positive', 'True Positive', 'Suspicious', and 'Undefined'. |


    ### Flow Description


    1. **Initialization**: Extracts the SentinelOne API configuration and the action
    parameters (Threat IDs and the target Verdict).

    2. **Threat Retrieval**: For each provided Threat ID, the action fetches the current
    threat details from SentinelOne to verify its existence and current state.

    3. **Comparison**: It compares the current analyst verdict in SentinelOne with
    the requested verdict. If they are already identical, the update is skipped for
    that specific threat to avoid redundant API calls.

    4. **Update Execution**: If the verdicts differ, the action sends a POST request
    to the SentinelOne API to update the analyst verdict for that threat.

    5. **Result Aggregation**: The action tracks which threats were successfully updated
    and which failed (e.g., due to the ID not being found) and returns a summary message
    to the user.
