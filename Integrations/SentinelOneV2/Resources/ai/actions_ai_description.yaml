    ### General Description

    The Ping action is a diagnostic tool used to verify the connectivity between Google
    SecOps and the SentinelOne V2 instance. It ensures that the provided API Root
    and API Token are valid and that the network path (including SSL verification)
    is functional.


    ### Parameters Description

