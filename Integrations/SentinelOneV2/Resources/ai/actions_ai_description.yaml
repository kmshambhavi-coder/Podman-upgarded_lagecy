Create Hash Blacklist Record:
  ai_description: >-
    Adds file hashes to the SentinelOne blacklist (restrictions). This action is used
    to prevent the execution of specific files identified by their SHA1 hash across
    the SentinelOne protected environment. It supports scoping the blacklist to specific
    Accounts, Sites, or Groups, or applying it globally across the entire tenant.


    ### Flow Description:

    1. **Parameter Extraction:** The action retrieves API connection details and user-defined
    parameters, including the target Operating System and the scope of the blacklist.

    2. **Entity Filtering:** It identifies all `FILEHASH` entities within the current
    context.

    3. **Validation:** It ensures that at least one scope is defined: either the 'Add
    to global black list' flag must be true, or at least one Site, Group, or Account
    ID must be provided.

    4. **Blacklist Creation:** For each hash, it sends a POST request to the SentinelOne
    API to create a new restriction record.

    5. **Error Handling:** It specifically handles 'Already Exists' errors to inform
    the user if a hash was already blacklisted and catches permission errors.

    6. **Result Reporting:** It compiles a summary of successful, already existing,
    and failed operations, providing the raw JSON results for successful additions.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Operating System | String | Yes | The OS for which the hash restriction applies.
    Possible values: windows, windows_legacy, macos, linux. |

    | Site IDs | String | No | Comma-separated list of Site IDs to apply the blacklist
    to. |

    | Group IDs | String | No | Comma-separated list of Group IDs to apply the blacklist
    to. |

    | Account IDs | String | No | Comma-separated list of Account IDs to apply the
    blacklist to. |

    | Description | String | No | A description or note to associate with the blacklist
    record in SentinelOne. |

    | Add to global black list | Boolean | Yes | If enabled, the hash is added to
    the global blacklist. When this is true, specific Site, Group, and Account IDs
    are ignored. |


    ### Additional Notes:

    * **Important:** Only SHA1 hashes are supported by SentinelOne for this operation.

    * At least one scope must be configured: either 'Add to global black list' must
    be set to True, or at least one of 'Site IDs', 'Group IDs', or 'Account IDs' must
    be populated for the action to execute.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds the specified file hashes to the SentinelOne blacklist (restrictions) for
      specific scopes (Site, Group, Account) or globally, which prevents those files
      from executing on protected endpoints.
    fetches_data: false
    internal_data_mutation_explanation: null
