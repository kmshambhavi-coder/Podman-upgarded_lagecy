Move Agents:
  ai_description: >-
    ### General Description

    This action moves SentinelOne agents associated with specific entities to a designated
    group within the SentinelOne console. It is primarily used for organizational
    management, policy application, or isolation workflows by relocating endpoints
    to a different group context. The action supports both Hostname and IP Address
    entities and can identify the target group using either a unique Group ID or a
    Group Name.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Group ID | String | No | The unique identifier of the group where the agents
    should be moved. If provided, this takes priority over the Group Name. |

    | Group Name | String | No | The name of the group where the agents should be
    moved. This is used to resolve the Group ID if the ID is not explicitly provided.
    |


    ### Additional Notes

    * **Mandatory Requirement:** Either 'Group ID' or 'Group Name' must be provided
    for the action to execute successfully. If both are missing, the action will fail
    during validation.

    * **Site Constraint:** The target group must belong to the same site as the agents
    being moved.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the API configuration and the
    target group identifiers (ID or Name).

    2. **Validation:** It verifies that at least one group identifier is provided.

    3. **Group Resolution:** If only a Group Name is provided, the action queries
    the SentinelOne API to resolve the corresponding Group ID.

    4. **Entity Processing:** The action iterates through the provided entities (Hostnames
    and IP Addresses) and attempts to find a matching agent in SentinelOne for each.

    5. **Agent Relocation:** For every agent successfully identified, the action sends
    a request to SentinelOne to move that agent to the target group.

    6. **Result Reporting:** The action tracks which agents were successfully moved,
    which were already in the target group, and which could not be found or moved,
    providing a detailed summary in the output message.
