Update Incident Status:
  ai_description: >-
    ### General Description

    Updates the incident status for one or more threats in SentinelOne. This action
    allows security analysts to programmatically manage the lifecycle of threats by
    transitioning them between statuses such as Resolved, Unresolved, or In Progress.
    It is useful for automating the closing of alerts or marking them as under investigation
    based on SOAR logic.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Threat ID | String | Yes | A comma-separated list of SentinelOne threat identifiers
    to be updated. |

    | Status | String | Yes | The target incident status. Supported values are `Resolved`,
    `Unresolved`, and `In Progress`. |


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the API configuration (API Root, Token)
    and the user-provided threat IDs and target status.

    2. **Connectivity & Initialization**: Establishes a connection to the SentinelOne
    management console via the `SentinelOneV2ManagerFactory`.

    3. **Status Mapping**: Maps the human-readable status input (e.g., 'Resolved')
    to the specific API values required by SentinelOne (e.g., 'resolved').

    4. **Threat Processing**: Iterates through each provided Threat ID:
        - Fetches the current state of the threat using `get_threat_or_raise` to verify
    its existence and current status.
        - If the threat's current status is already equal to the target status, it
    skips the update and marks it as successful.
        - If the status differs, it sends a POST request to the SentinelOne API to
    update the `incidentStatus`.
    5. **Result Aggregation**: Compiles a summary of successfully updated threats
    and those that failed (e.g., due to being not found or API errors) and returns
    the final execution status.
