    \ | Boolean | No | If enabled, the action will create a visual insight on the\
    \ entity containing a summary of the endpoint's status and general information.\
    \ Default is True. |\n| Only Infected Endpoints Insights | Boolean | No | If enabled,\
    \ insights will only be generated for endpoints that are currently flagged as\
    \ 'infected' in SentinelOne. Default is True. |\n\n### Additional Notes\n- The\
    \ action supports both Hostname and IP Address entities.\n- Enriched data is added\
    \ to the entity's additional properties with the prefix `SENO_`.\n- If `Only Infected\
    \ Endpoints Insights` is set to True, healthy endpoints will still be enriched\
    \ with properties and tables, but will not receive a visual insight.\n\n### Flow\
    \ Description\n1. **Initialization**: The action establishes a connection to the\
