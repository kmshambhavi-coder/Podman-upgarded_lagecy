Mark as Threat:
  ai_description: >-
    ### General Description

    Marks suspicious threats as true positive threats in SentinelOne. This action
    allows analysts to programmatically confirm detections, updating the analyst verdict
    in the SentinelOne console to 'true_positive'. This is typically used in response
    workflows after a threat has been verified.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Threat IDs** | String | Yes | A comma-separated list of SentinelOne threat
    IDs that should be marked as true positive threats. |


    ### Flow Description

    1. **Setup**: Retrieves the API root, token, and SSL verification settings from
    the integration configuration.

    2. **Input Parsing**: Extracts the `Threat IDs` parameter and converts the comma-separated
    string into a list of individual identifiers.

    3. **API Connection**: Initializes the SentinelOne manager factory to establish
    a connection with the SentinelOne API.

    4. **Execution Loop**: Iterates through each provided Threat ID and performs the
    following:
        * Sends a POST request to the `analyst-verdict` endpoint to set the verdict
    to `true_positive`.
        * Retrieves the updated threat details from the API to confirm the status
    change.
        * Checks the blacklist status of the threat's file hash.
    5. **Reporting**: Tracks successful and failed updates, constructs a summary message,
    and attaches the detailed threat data as JSON results.

    6. **Completion**: Ends the action with a success or failure status based on whether
    any threats were successfully marked.
