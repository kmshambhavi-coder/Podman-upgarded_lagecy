Get Deep Visibility Query Result:
  ai_description: >-
    ### General Description

    The **Get Deep Visibility Query Result** action retrieves the results of a Deep
    Visibility query previously initiated in SentinelOne. This action is designed
    to be used in conjunction with the 'Initiate Deep Visibility Query' action, using
    the `query_id` generated by that process. It checks the status of the query and,
    once finished, fetches the associated event logs.


    ### Parameters Description

    | Parameter | Type | Mandatory | Default | Description |

    | :--- | :--- | :--- | :--- | :--- |

    | **Query ID** | String | Yes | N/A | The unique identifier of the query for which
    results are being requested. This ID is obtained from the output of the 'Initiate
    Deep Visibility Query' action. |

    | **Limit** | Integer | No | 50 | The maximum number of events to return in the
    results. The value must be between 1 and 100. |


    ### Additional Notes

    - This is an **asynchronous** action. If the query is still being processed by
    SentinelOne, the action will return an 'In Progress' status and will be retried
    automatically by the SOAR platform until the query completes or times out.

    - The results are presented both as a data table on the case wall and as a raw
    JSON object for use in subsequent playbook steps.


    ### Flow Description

    1. **Initialization**: The action initializes the SentinelOne manager using the
    provided API configuration.

    2. **Status Check**: It requests the current status of the query from SentinelOne
    using the provided `Query ID`.

    3. **Conditional Execution**:
        - If the status is **RUNNING**, the action sets its state to 'In Progress'
    to wait for completion.
        - If the status is **FINISHED**, it proceeds to fetch the event data.
        - If the status indicates a failure (e.g., FAILED, ERROR, TIMED_OUT), the
    action fails with an error message.
    4. **Data Retrieval**: Upon successful completion of the query, it fetches the
    events up to the specified `Limit`.

    5. **Output**: The retrieved events are formatted into a data table named 'SentinelOne
    Events' and added to the case, and the full event list is returned as a JSON result.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
