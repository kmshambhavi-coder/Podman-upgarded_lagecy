Update Alert:
  ai_description: >-
    ### General Description

    Updates the status and/or analyst verdict of a specific alert in SentinelOne.
    This action allows analysts to programmatically manage alert lifecycles by setting
    incident statuses and verdicts directly from Google SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Alert ID | String | Yes | The unique ID of the alert to be updated. Must be
    a numeric string. |

    | Status | DDL | No | The new incident status for the alert. Options include:
    Unresolved, In Progress, Resolved. |

    | Verdict | DDL | No | The new analyst verdict for the alert. Options include:
    True Positive, False Positive, Suspicious, Undefined. |


    ### Additional Notes

    - **Requirement**: At least one of the **Status** or **Verdict** parameters must
    be configured for the action to run.

    - The action performs a check to see if the requested value is already set in
    SentinelOne before sending an update request to avoid redundant API calls.


    ### Flow Description

    1. **Parameter Extraction & Validation**: The action retrieves the Alert ID, Status,
    and Verdict. It validates that the Alert ID is numeric and ensures that at least
    one update field (Status or Verdict) is provided.

    2. **Connectivity Check**: Initializes the SentinelOne API client and verifies
    connectivity to the API root.

    3. **Pre-update Retrieval**: Fetches the current state of the alert from SentinelOne
    to ensure it exists and to compare current values with requested updates.

    4. **Status Update**: If a new Status is provided and it differs from the current
    status in SentinelOne, the action sends a POST request to update the incident
    status.

    5. **Verdict Update**: If a new Verdict is provided and it differs from the current
    verdict in SentinelOne, the action sends a POST request to update the analyst
    verdict.

    6. **Result Finalization**: If any updates were successfully performed, the action
    fetches the updated alert details and returns them as JSON results.
