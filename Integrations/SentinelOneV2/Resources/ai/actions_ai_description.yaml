Get Agent Status:
  ai_description: >-
    ### General Description

    Retrieves the operational status (Active or Not Active) of SentinelOne agents
    associated with Hostname or IP Address entities. This action is used to verify
    the connectivity and health of endpoints directly from the SentinelOne console,
    providing immediate visibility into whether an agent is currently communicating
    with the management server.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Api Root | String | Yes | The root URL of the SentinelOne API instance (e.g.,
    https://<tenant>.sentinelone.net). |

    | API Token | String | Yes | The API token used for authentication with the SentinelOne
    instance. |

    | Verify SSL | Boolean | No | If set to true, the action will verify the SSL certificate
    of the SentinelOne server. Defaults to False. |


    ### Additional Notes

    - The action supports both **HOSTNAME** and **ADDRESS** (IP) entity types.

    - If an agent is found but does not have a valid UUID, it will be treated as a
    failure.

    - Results are presented in a data table named 'Agents Statuses'.


    ### Flow Description

    1. **Initialization**: Extracts the API configuration (Root, Token, SSL) and filters
    the case entities to identify supported Hostnames and IP Addresses.

    2. **Connectivity Check**: Initializes the SentinelOne manager and performs a
    connectivity test to ensure the API credentials are valid.

    3. **Agent Discovery**: Iterates through the scoped entities. For Hostnames, it
    searches for agents by computer name; for IP Addresses, it searches by network
    interface identifiers.

    4. **Status Check**: For every successfully discovered agent, it queries the SentinelOne
    API to determine if the agent's status is currently 'Active'.

    5. **Data Compilation**: Maps the boolean status to human-readable values ('Active'
    or 'Not Active') and aggregates them into a JSON result and a data table.

    6. **Error Handling**: Any entities that could not be matched to an agent or encountered
    API errors are recorded in an 'Unsuccessful Attempts' data table.

    7. **Finalization**: Updates the action output with a summary message and the
    collected status data.
