    and `Verify SSL` settings from the integration configuration.

    2. **Manager Initialization**: It initializes the `SentinelOneV2Manager` via a
    factory, which sets up the request session with the appropriate authorization
    headers.

    3. **Connectivity Test**: The action calls the `test_connectivity` method, which
    performs a `GET` request to the `/agents/count` endpoint of the SentinelOne API.

    4. **Validation**: The script validates the HTTP response. If the status code
    is successful (e.g., 200 OK), it confirms the connection.

    5. **Result Reporting**: The action returns a boolean success value and an output
    message indicating whether the connection was established or failed with a specific
    error.
