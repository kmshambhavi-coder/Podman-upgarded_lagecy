    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new exclusion (whitelist) record in the SentinelOne console for the
      provided file hashes, effectively changing the security policy for those files.
