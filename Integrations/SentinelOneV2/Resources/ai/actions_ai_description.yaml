Initiate Full Scan:
  ai_description: >-
    ### General Description

    Initiates a full disk scan on target endpoints within the SentinelOne environment.
    This action is used to trigger a comprehensive security scan on specific hosts
    or IP addresses to identify potential threats or malware residing on the disk.


