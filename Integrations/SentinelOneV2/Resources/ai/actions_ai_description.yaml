Get Blacklist:
  ai_description: >-
    ### General Description

    The **Get Blacklist** action retrieves a list of all items currently available
    in the SentinelOne blacklist. This action allows security analysts to audit or
    verify the presence of specific file hashes across various organizational scopes
    such as sites, groups, or accounts. It is primarily used for visibility and reporting
    on restricted artifacts within the SentinelOne environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Hash** | String | No | A comma-separated list of hashes to check in the blacklist.
    If provided, the `Limit` parameter is ignored. |

    | **Site IDs** | String | No | A comma-separated list of site IDs used to filter
    the returned blacklist items. |

    | **Group IDs** | String | No | A comma-separated list of group IDs used to filter
    the returned blacklist items. |

    | **Account IDs** | String | No | A comma-separated list of account IDs used to
    filter the returned blacklist items. |

    | **Limit** | Integer | No | Specifies the maximum number of blacklist items to
    return (Default: 50, Max: 1000). This is ignored if the `Hash` parameter is populated.
    |

    | **Query** | String | No | A custom query string used to further filter the blacklist
    results. |

    | **Use Global Blacklist** | Boolean | No | If enabled, the action will also retrieve
    hashes from the global (tenant-wide) blacklist. |


    ### Additional Notes

    - **Mandatory Scope:** To execute successfully, at least one of the following
    must be provided: `Site IDs`, `Group IDs`, `Account IDs`, or the `Use Global Blacklist`
    parameter must be set to `True`. Failure to provide a scope will result in a validation
    error.

    - The action returns data in both a raw JSON format and a formatted data table
    named "Blacklist Hashes".


    ### Flow Description

    1. **Initialization:** The action extracts the API configuration (Root URL, Token)
    and user-defined parameters.

    2. **Scope Validation:** It verifies that at least one scope (Site, Group, Account,
    or Global) is defined to ensure the query is targeted.

    3. **API Connection:** Initializes the SentinelOne manager via the factory based
    on the configured API version.

    4. **Data Retrieval:**
        - If specific **Hashes** are provided, the action iterates through each hash
    and queries the SentinelOne blacklist endpoint for matches.
        - If no hashes are provided, it performs a bulk retrieval of blacklist items
    based on the provided scope, query, and limit filters.
    5. **Output Generation:** The retrieved items are processed into a JSON result
    and a data table for display within the Google SecOps case wall.
