Create Path Exclusion Record:
  ai_description: >-
    ### General Description

    Adds a file or folder path to the SentinelOne exclusion list. This action allows
    administrators to prevent specific paths from being monitored or flagged by the
    SentinelOne agent, which is useful for excluding known safe applications or performance-sensitive
    directories.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Path | String | Yes | The file or folder path to be excluded. |

    | Operation System | String | Yes | The OS for the path (windows, windows_legacy,
    macos, linux). |

    | Site IDs | String | No | Comma-separated list of site IDs for the exclusion
    scope. |

    | Group IDs | String | No | Comma-separated list of group IDs for the exclusion
    scope. |

    | Account IDs | String | No | Comma-separated list of account IDs for the exclusion
    scope. |

    | Description | String | No | Additional context for the exclusion record. |

    | Add to global exclusion list | Boolean | No | If true, applies the exclusion
    globally across the tenant. |

    | Include Subfolders | Boolean | No | If true, includes all subdirectories (only
    for folder paths). |

    | Mode | String | No | The exclusion mode (e.g., Suppress Alerts, Performance
    Focus). |


    ### Additional Notes

    At least one scope must be provided: either 'Site IDs', 'Group IDs', 'Account
    IDs', or 'Add to global exclusion list' must be configured for the action to run
    successfully.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the API configuration and user-provided
    parameters.

    2. **Validation:** It verifies that at least one scope (Site, Group, Account,
    or Global) is specified.

    3. **Path Analysis:** It determines if the provided path is a file or a folder
    to set the correct exclusion type.

    4. **API Interaction:** It sends a POST request to the SentinelOne `/web/api/v2.1/exclusions`
    endpoint with the exclusion details.

    5. **Result Processing:** The action returns the JSON representation of the created
    exclusion record(s).
