Create Device Control Rule:
  ai_description: >-
    ### General Description

    Creates a new Device Control Rule in SentinelOne. This action allows security
    administrators to programmatically define and deploy policies that control how
    external devices (such as USB drives) interact with endpoints across specific
    organizational scopes (Accounts, Sites, or Groups).


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Rule JSON | JSON | Yes | A JSON object defining the rule's properties. Expected
    keys include `ruleName`, `interface` (e.g., USB), `ruleType`, `action` (e.g.,
    Allow, Block), `accessPermission` (e.g., Read-Only, Read-Write), `deviceClass`,
    and `status` (e.g., Enabled, Disabled). |

    | Scope JSON | JSON | Yes | A JSON object defining the target scope for the rule.
    Expected keys include `accountIds`, `groupIds`, or `siteIds` to specify where
    the rule should be applied. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the API configuration and the
    user-provided JSON strings for the rule and scope.

    2. **Validation**: It validates that the provided `Rule JSON` and `Scope JSON`
    are syntactically correct JSON objects.

    3. **API Interaction**: The action sends a POST request to the SentinelOne `/web/api/v2.1/device-control`
    endpoint, passing the rule data and scope filters in the request payload.

    4. **Result Processing**: The action captures the response from SentinelOne, which
    contains the details of the newly created rule, and provides it as the action
    output.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new Device Control Rule in the SentinelOne management console, which
      changes the security policy configuration for the specified scope.
