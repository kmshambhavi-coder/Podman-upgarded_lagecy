Disconnect Agent From Network:
  ai_description: "Disconnects SentinelOne agents from the network based on Hostname\
    \ or IP Address entities. This action is primarily used for host isolation during\
    \ incident response to prevent the spread of threats. \n\n### Parameters\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Api Root\
    \ | String | Yes | The root URL of the SentinelOne API instance. |\n| API Token\
    \ | String | Yes | The API token used for authentication. |\n| Verify SSL | Boolean\
    \ | No | If enabled, verifies the SSL certificate for the connection. Default\
    \ is False. |\n\n### Additional Notes\nThis action requires the SentinelOne agent\
    \ to be active and reachable by the management console to receive the disconnect\
    \ command. If an agent cannot be found for a specific entity, that entity will\
    \ be skipped and logged in the results.\n\n### Flow Description\n1. **Initialization**:\
    \ Retrieves the API root, token, and SSL verification settings from the integration\
    \ configuration.\n2. **Entity Filtering**: Filters the target entities to identify\
    \ supported types: Hostnames and IP Addresses.\n3. **Agent Lookup**: For each\
    \ suitable entity, the action queries the SentinelOne API to retrieve the unique\
    \ Agent ID associated with that hostname or IP address.\n4. **Network Disconnection**:\
    \ If an agent is found, the action issues a command to SentinelOne to disconnect\
    \ that specific agent from the network.\n5. **Result Processing**: Tracks successful\
    \ disconnections and captures any errors encountered during the process. If errors\
    \ occur, they are compiled into a data table named 'Unsuccessful Attempts' for\
    \ the analyst to review."
