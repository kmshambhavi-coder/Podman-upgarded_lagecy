Delete Device Control Rule:
  ai_description: >-
    ### General Description

    Deletes a specific Device Control Rule from the SentinelOne management console.
    This action allows security teams to programmatically remove device control policies
    (such as USB or peripheral restrictions) at the Account, Site, or Group level.
    It first verifies the existence of the rule to retrieve its name, which is a required
    parameter for the deletion process in the SentinelOne API.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Rule ID** | String | Yes | The unique identifier of the Device Control Rule
    to be deleted. |

    | **Scope Type** | String (DDL) | No | The organizational level where the rule
    is applied. Supported values: `Account`, `Site`, `Group`. Defaults to `Account`.
    |

    | **Scope ID** | String | Yes | The unique identifier of the specific scope (e.g.,
    the specific Account ID, Site ID, or Group ID) where the rule is located. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the Rule ID, Scope Type, and
    Scope ID from the input parameters.

    2. **Validation**: Validates that the provided Scope Type is one of the allowed
    values (Account, Site, or Group).

    3. **Rule Verification**: Calls the SentinelOne API to fetch the details of the
    rule using the Rule ID and Scope information. This step is necessary to obtain
    the `ruleName` required for the deletion request.

    4. **Deletion Execution**: If the rule is found, the action sends a DELETE request
    to the SentinelOne endpoint, passing the Rule ID and Rule Name in the filter payload.

    5. **Outcome Reporting**: If the deletion is successful, it returns a success
    message. If the rule was not found initially, it informs the user that the rule
    does not exist in SentinelOne.


    ### Additional Notes

    - This action performs a state-changing operation in SentinelOne by permanently
    removing a rule.

    - The action requires the Rule Name for deletion; however, the user only needs
    to provide the Rule ID, as the action fetches the name automatically.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Deletes a Device Control Rule configuration from the SentinelOne platform using
      a DELETE API request.
    fetches_data: true
    internal_data_mutation_explanation: null
