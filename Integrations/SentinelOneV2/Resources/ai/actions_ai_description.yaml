    |

    | Verify SSL | Boolean | No | If enabled (True), the action will verify the SSL
    certificate of the SentinelOne server. Default is False. |


    ### Additional Notes

    * This action requires the SentinelOne Agent to be installed and active on the
    target endpoint.

    * The action identifies the correct agent by matching the Hostname or IP Address
    entity provided in the Google SecOps context.


    ### Flow Description

    1. **Initialization**: The action retrieves connection details (API Root, Token,
    SSL settings) from the integration configuration.

    2. **Entity Filtering**: It identifies all `HOSTNAME` and `ADDRESS` entities within
    the current scope.

    3. **Agent Identification**: For each entity, the action queries the SentinelOne
    API to find the corresponding Agent UUID using the hostname or IP address.

    4. **Scan Initiation**: Once the Agent UUID is retrieved, the action sends a POST
    request to the SentinelOne API to trigger the 'Initiate Scan' command for that
    specific agent.

    5. **Result Reporting**: The action tracks successful and failed scan initiations.
    If any errors occur (e.g., agent not found or API error), they are logged and
    presented in a data table named 'Unsuccessful Attempts'.
