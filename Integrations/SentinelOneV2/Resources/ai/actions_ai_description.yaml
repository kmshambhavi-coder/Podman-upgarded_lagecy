Delete Hash Blacklist Record:
  ai_description: "Deletes SHA1 hashes from the SentinelOne blacklist (restrictions).\
    \ This action allows security analysts to unblock specific file hashes across\
    \ different scopes, including specific sites, groups, accounts, or the entire\
    \ global tenant. \n\n### Parameters Description\n\n| Parameter | Type | Mandatory\
    \ | Description |\n| :--- | :--- | :--- | :--- |\n| Site IDs | String | No | A\
    \ comma-separated list of SentinelOne Site IDs from which the hash should be removed.\
    \ |\n| Group IDs | String | No | A comma-separated list of SentinelOne Group IDs\
    \ from which the hash should be removed. |\n| Account IDs | String | No | A comma-separated\
    \ list of SentinelOne Account IDs from which the hash should be removed. |\n|\
    \ Remove from global black list | Boolean | No | If enabled, the action removes\
    \ the hash from the global blacklist. When this is True, Site, Group, and Account\
    \ IDs are ignored. |\n\n### Flow Description\n\n1. **Initialization**: The action\
    \ retrieves connection details (API Root, Token) and scope parameters (Site, Group,\
    \ Account IDs, or Global flag).\n2. **Validation**: It ensures that at least one\
    \ scope parameter is provided (either a specific ID or the global flag).\n3. **Entity\
    \ Filtering**: It identifies all `FILEHASH` entities within the current context.\n\
    4. **Hash Verification**: For each entity, it verifies if the identifier is a\
    \ valid SHA1 hash (40 characters). Non-SHA1 hashes are marked as failed.\n5. **Lookup**:\
    \ It queries the SentinelOne API to find the internal restriction ID associated\
    \ with the hash in the specified scope.\n6. **Deletion**: If a matching restriction\
    \ is found, it executes a DELETE request to remove that specific hash from the\
    \ blacklist.\n7. **Reporting**: The action summarizes which hashes were successfully\
    \ removed, which were not found in the blacklist, and which failed due to incorrect\
    \ format or API errors.\n\n### Additional Notes\n\n* **SHA1 Only**: SentinelOne's\
    \ restriction deletion API used in this action specifically supports SHA1 hashes.\
    \ MD5 or SHA256 entities will be skipped.\n* **Scope Precedence**: Enabling 'Remove\
    \ from global black list' takes precedence over any provided Site, Group, or Account\
    \ IDs."
