Get Application List For Endpoint:
  ai_description: >-
    ### General Description

    The **Get Application List For Endpoint** action retrieves a comprehensive list
    of applications installed on a specific endpoint managed by SentinelOne. It supports
    searching for the endpoint using either its **IP Address** or **Hostname**. This
    action is primarily used for software inventory audits, identifying unauthorized
    software, or verifying the presence of specific security tools during an investigation.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Max Applications To Return | Defines the maximum number of application records
    to retrieve for each endpoint. If left empty, the action attempts to retrieve
    all available applications. | Integer | No |


    ### Flow Description

    1. **Initialization**: The action extracts the SentinelOne API credentials and
    the optional `Max Applications To Return` parameter.

    2. **Entity Filtering**: It identifies all `ADDRESS` (IP) and `HOSTNAME` entities
    within the current scope.

    3. **Agent Discovery**: For each entity, the action queries the SentinelOne console
    to find the corresponding Agent ID by hostname or IP address.

    4. **Data Retrieval**: Once the Agent ID is found, it calls the SentinelOne API
    to fetch the list of installed applications, applying the user-defined limit if
    provided.

    5. **Result Processing**:
        * For successful retrievals, an **Entity Table** is created for the specific
    entity, displaying application details such as Name, Publisher, Version, and Install
    Date.
        * The raw data is also added to the action's JSON results.
    6. **Error Handling**: If an agent cannot be found or an API error occurs for
    a specific entity, the details are recorded in an "Unsuccessful Attempts" data
    table.


    ### Additional Notes

    * This action is read-only regarding the external system and does not modify any
    settings on the SentinelOne agent or the endpoint itself.
