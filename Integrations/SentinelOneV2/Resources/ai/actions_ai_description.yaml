Download Threat File:
  ai_description: >-
    ### General Description

    The **Download Threat File** action enables security analysts to retrieve the
    original file associated with a specific threat detected by SentinelOne. This
    is primarily used for offline malware analysis and forensic investigations. The
    action triggers a 'Fetch File' request in the SentinelOne console, monitors the
    threat's timeline for the generated download link, and then downloads the file
    to a local directory on the Google SecOps runner as a password-protected ZIP archive.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Threat ID** | String | Yes | The unique identifier of the threat in SentinelOne
    for which the file should be downloaded. |

    | **Password** | Password | Yes | The password to be applied to the resulting
    ZIP file. Requirements: Minimum 10 characters, including uppercase, lowercase,
    digits, and special symbols. |

    | **Download Folder Path** | String | Yes | The local filesystem path on the runner
    where the downloaded file will be stored. |

    | **Overwrite** | Boolean | Yes | Determines whether to overwrite an existing
    file in the destination folder if a filename collision occurs. |


    ### Additional Notes

    - **Permissions**: The SentinelOne API token used must belong to a user with 'Fetch
    Threat File' permissions (typically Admin, IR Team, or SOC roles).

    - **Asynchronous Execution**: This action is asynchronous. It initiates a job
    and then enters a polling state, waiting for SentinelOne to process the file and
    provide a download URL.


    ### Flow Description

    1. **Path Validation**: Checks if the specified `Download Folder Path` exists
    on the local runner.

    2. **Initiate Fetch**: Sends a POST request to SentinelOne to create a fetch-file
    job for the specified `Threat ID` using the provided `Password`.

    3. **Timeline Polling**: Periodically queries the threat's timeline to check if
    the fetch job has completed and a download URL is available.

    4. **File Retrieval**: Once the download URL appears, the action fetches the raw
    file content from SentinelOne.

    5. **Local Storage**: Saves the file content to the local disk at the specified
    path and returns the absolute file path in the action results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Initiates a 'Fetch File' job within the SentinelOne platform, which is a state-changing
      operation that prepares a threat artifact for retrieval.
    fetches_data: true
    internal_data_mutation_explanation: null
