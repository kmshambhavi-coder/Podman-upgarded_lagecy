Get Events For Endpoint Hours Back:
  ai_description: >-
    ### General Description

    This action retrieves detailed event information from a SentinelOne endpoint for
    a specified time window. It supports both IP Address and Hostname entities. The
    action utilizes SentinelOne's Deep Visibility (EDR) capabilities to fetch various
    event types, including process creations, file modifications, DNS queries, and
    network actions. Due to SentinelOne API rate limits for Deep Visibility queries,
    this action is designed to process one endpoint per minute and operates asynchronously
    to wait for query completion.


    ### Parameters Description

    | Parameter | Type | Mandatory | Default | Description |

    | :--- | :--- | :--- | :--- | :--- |

    | Hours Back | Integer | Yes | N/A | Specifies the lookback period (in hours)
    from the current time to fetch events. |

    | Events Amount Limit | Integer | No | 50 | The maximum number of events to return
    for each enabled event type. |

    | Include File Events Information | Boolean | No | False | If enabled, retrieves
    events related to file system activities (e.g., creation, deletion, renaming).
    |

    | Include Indicator Events Information | Boolean | No | False | If enabled, retrieves
    events related to threat indicators. |

    | Include DNS Events Information | Boolean | No | False | If enabled, retrieves
    DNS query and response events. |

    | Include Network Actions Events Information | Boolean | No | False | If enabled,
    retrieves network connection events (IPs, ports, direction). |

    | Include URL Events Information | Boolean | No | False | If enabled, retrieves
    URL/web request events. |

    | Include Registry Events Information | Boolean | No | False | If enabled, retrieves
    Windows Registry modification events. |

    | Include Scheduled Task Events Information | Boolean | No | False | If enabled,
    retrieves events related to the creation or modification of scheduled tasks. |


    ### Flow Description

    1.  **Agent Identification**: The action iterates through the provided IP and
    Hostname entities and attempts to find a matching SentinelOne Agent UUID using
    the SentinelOne API.

    2.  **Query Initialization (First Run)**: For each identified agent, the action
    initializes a Deep Visibility query targeting that specific Agent UUID within
    the timeframe defined by the 'Hours Back' parameter.

    3.  **Asynchronous Wait**: The action enters an 'In Progress' state, allowing
    the SentinelOne backend time to process the complex EDR query.

    4.  **Status Check**: In subsequent runs, the action checks the status of the
    initialized queries. If a query is still running, the action continues to wait.

    5.  **Data Retrieval**: Once a query is marked as 'FINISHED', the action fetches
    the results for all enabled event categories (Process events are fetched by default;
    others depend on the 'Include' parameters).

    6.  **Reporting**: The retrieved events are formatted into data tables (one per
    event type per entity) and attached to the case. The raw data is also provided
    in the action's JSON result.


    ### Additional Notes

    *   **Rate Limiting**: SentinelOne imposes strict rate limits on Deep Visibility
    query initialization. This action is optimized to handle these limits, but users
    should avoid running it on a large number of entities simultaneously.

    *   **Process Events**: Process creation events are always included if found,
    regardless of the optional boolean parameters.
